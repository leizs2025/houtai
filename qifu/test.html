<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福日汇总报表 (诊断版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; font-size: 14px; background: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; text-align: center; }
        .receipt-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .row-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .left-info { font-size: 14px; color: #333; }
        .right-info { font-size: 16px; font-weight: 800; color: #d9534f; font-family: monospace; }
        .row-detail { font-size: 14px; color: #555; margin-top: 5px; border-top: 1px solid #eee; padding-top: 5px; }
        .label { font-weight: bold; color: #000; }
        .debug-text { color: blue; font-weight: bold; background: #eef; padding: 2px 4px; } /* 高亮显示诊断信息 */

        .summary-table { width: 98%; margin-top: 30px; border-collapse: collapse; table-layout: fixed; }
        .summary-table th, .summary-table td { border: 1px solid #000; padding: 6px 8px; text-align: left; word-break: break-all; }
        .summary-table th { background-color: #f0f0f0; }
        .summary-table td.count-col { font-size: 1.2em; font-weight: bold; text-align: center; background-color: #e8f4fd; }
        .total-amount { font-size: 1.3em; color: #d9534f; text-align: right; margin-top: 20px; font-weight: bold; }

        @media print {
            @page { size: auto; margin: 10mm 10mm; }
            body { margin: 0; padding: 0; }
            .no-print { display: none; }
            .receipt-item { break-inside: avoid; }
            .summary-table { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 祈福日结报表 (诊断版)</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <button onclick="loadDailyReceipts()">🔄 加载数据</button>
            <button onclick="printSummary()">🖨️ 打印报表</button>
            <button onclick="clearCache()" style="color:red;">⚠️ 清空缓存</button>
        </div>
    </div>

    <div id="reportContent"></div>

    <script>
        // --- 工具函数 ---
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('system_id') || 'system_1';
        }

        function getDailyCachedReceipts(date) {
            const SYSTEM_ID = getCurrentSystemId();
            const cacheKey = `daily_receipts_${date}_${SYSTEM_ID}`;
            return JSON.parse(localStorage.getItem(cacheKey) || '[]');
        }

        // --- 主逻辑：生成报表 ---
        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const receipts = getDailyCachedReceipts(selectedDate);

            if (receipts.length === 0) {
                document.getElementById('reportContent').innerHTML = '<p style="text-align:center; color:#888;">该日期暂无数据</p>';
                return;
            }

            let html = `<h3>日期：${selectedDate} | 共 ${receipts.length} 笔</h3>`;
            let grandTotal = 0;

            receipts.forEach((item, index) => {
                const d = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const totalAmount = parseFloat(d.total || 0).toFixed(2);
                grandTotal += parseFloat(totalAmount);

                // --- 核心诊断逻辑 ---
                // 1. 检查 d.paymentMethod 是否存在
                // 2. 检查 d.payMethod (少了一个ent的拼写)
                // 3. 检查 d.transferSlip (旧逻辑)
                
                const rawMethod = d.paymentMethod || d.payMethod || "UNDEFINED"; 
                const displayMethod = (rawMethod === "UNDEFINED" || !rawMethod) 
                    ? (d.transferSlip ? "Transfer (旧逻辑)" : "Cash (旧逻辑)") 
                    : rawMethod;

                // 手机号处理
                const phone = d.phoneNumber ? d.phoneNumber.replace(/[-\s]/g, '') : 'N/A';

                // --- 智能汇总贡品 ---
                let counts = { token: 0, fire: 0, pg3: 0, pg6: 0 };
                if (d.data && Array.isArray(d.data)) {
                    d.data.forEach(p => {
                        counts.token += parseInt(p.token) || 0;
                        counts.fire += parseInt(p.fire) || 0;
                        counts.pg3 += parseInt(p.pg3) || 0;
                        counts.pg6 += parseInt(p.pg6) || 0;
                    });
                }

                let itemStr = [];
                if (counts.token > 0) itemStr.push(`令牌 × ${counts.token}`);
                if (counts.fire > 0) itemStr.push(`护摩 × ${counts.fire}`);
                if (counts.pg3 > 0) itemStr.push(`纸金3 × ${counts.pg3}`);
                if (counts.pg6 > 0) itemStr.push(`纸金6 × ${counts.pg6}`);
                
                const offeringText = itemStr.length > 0 
                    ? itemStr.join(' | ') 
                    : (d.sponsorAmount > 0 ? `随喜 RM ${d.sponsorAmount}` : '无明细');

                // --- 生成 HTML ---
                html += `
                    <div class="receipt-item">
                        <div class="row-main">
                            <div class="left-info">
                                收据编号: <strong>${d.receiptNumber || 'N/A'}</strong> | 
                                阳上报恩: <strong>${d.mainName || '匿名'}</strong>
                            </div>
                            <div class="right-info">
                                <!-- 这里显示诊断结果 -->
                                <span class="debug-text">[原始值: ${rawMethod}]</span>
                                ${displayMethod}
                                <br><span style="font-size:0.8em; font-weight:normal;">RM ${totalAmount} • ${time}</span>
                            </div>
                        </div>

                        <div class="row-detail">
                            <span class="label">电话:</span> ${phone} | 
                            <span class="label">法会:</span> ${d.dharmaType || '-'}
                        </div>
                        <div class="row-detail">
                            <span class="label">供奉:</span> ${offeringText}
                        </div>
                    </div>
                `;
            });

            html += `<div class="total-amount">总计金额: RM ${grandTotal.toFixed(2)}</div>`;
            html += generateSummaryTable(receipts);

            document.getElementById('reportContent').innerHTML = html;
        }

        // --- 生成底部统计表 ---
        function generateSummaryTable(receipts) {
            let stats = { token: 0, fire: 0, pg3: 0, pg6: 0 };
            receipts.forEach(item => {
                const d = item.receiptData;
                if (d.data && Array.isArray(d.data)) {
                    d.data.forEach(p => {
                        stats.token += parseInt(p.token) || 0;
                        stats.fire += parseInt(p.fire) || 0;
                        stats.pg3 += parseInt(p.pg3) || 0;
                        stats.pg6 += parseInt(p.pg6) || 0;
                    });
                }
            });

            if (stats.token === 0 && stats.fire === 0 && stats.pg3 === 0 && stats.pg6 === 0) {
                return '';
            }

            return `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th style="text-align:center;">总数量</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stats.token > 0 ? `<tr><td>祈福令牌</td><td class="count-col">${stats.token}</td></tr>` : ''}
                        ${stats.fire > 0 ? `<tr><td>小护摩片</td><td class="count-col">${stats.fire}</td></tr>` : ''}
                        ${stats.pg3 > 0 ? `<tr><td>纸金 3</td><td class="count-col">${stats.pg3}</td></tr>` : ''}
                        ${stats.pg6 > 0 ? `<tr><td>纸金 6</td><td class="count-col">${stats.pg6}</td></tr>` : ''}
                    </tbody>
                </table>
            `;
        }

        // --- 其他功能 ---
        function printSummary() { window.print(); }

        function clearCache() {
            if (confirm('确定要清空今日数据吗？')) {
                const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
                const SYSTEM_ID = getCurrentSystemId();
                localStorage.removeItem(`daily_receipts_${selectedDate}_${SYSTEM_ID}`);
                loadDailyReceipts();
            }
        }

        // 初始化
        window.onload = function() {
            document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
            loadDailyReceipts();
        };
    </script>
</body>
</html>
