<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Prayer Block</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 添加一些背景色帮助识别卡片 */
        .prayer-card { background-color: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>测试祈福卡片</h1>
        <div id="test-container"></div>
        <button onclick="addTestCard()">添加测试卡片</button>
    </div>

    <script>
        // 定义商品配置
        const PRODUCTS_CONFIG = {
            token: { name: "祈福令牌", price: 30 },
            fire: { name: "小护摩片", price: 15 },
            pg3: { name: "纸金 3", price: 3 },
            pg6: { name: "纸金 6", price: 6 }
        };

        // 定义 updateDonationBreakdown 函数 (即使暂时为空)
        function updateDonationBreakdown() {
            console.log("updateDonationBreakdown called.");
            // 这里可以放你的计算逻辑，暂时只打印日志
        }

        // 你提供的 createPrayerBlock 函数
window.createPrayerBlock = function (data = {}, index = 1) {
    const div = document.createElement("div");
    div.className = "card p-3 position-relative prayer-card"; // 移除了 mb-3，由外部容器管理卡片间距

    const tokenVal = data.token !== undefined ? data.token : 0;
    const fireVal = data.fire !== undefined ? data.fire : 0;
    const pg3Val = data.pg3 !== undefined ? data.pg3 : 0;
    const pg6Val = data.pg6 !== undefined ? data.pg6 : 0;

    div.innerHTML = `
        <div style="position:absolute; top:5px; right:10px; cursor:pointer;" onclick="this.parentElement.remove(); updateDonationBreakdown()">❌</div>
        <h6 class="mb-2">🧍‍♀️ 第 ${index} 位祈福者</h6> <!-- 调整标题下边距 -->
        <div class="row g-1"> <!-- 改为 g-1 或 g-2 -->
          <div class="col-md-4">
            <label class="form-label small">姓名</label> <!-- 添加 small 类使标签字体稍小 -->
            <input type="text" class="form-control form-control-sm" value="${data.name || ''}" oninput="updateDonationBreakdown()"> <!-- 添加 form-control-sm 使输入框稍小 -->
          </div>
          <div class="col-md-8">
            <label class="form-label small">现居地址</label> <!-- 添加 small 类 -->
            <input type="text" class="form-control form-control-sm" value="${data.address || ''}"> <!-- 添加 form-control-sm -->
          </div>
        </div>
        <div class="row g-1 mt-1"> <!-- 改为 g-1, mt-1 -->
          <div class="col-6 col-md-3">
            <label class="form-label small">${PRODUCTS_CONFIG.token.name}</label> <!-- 添加 small 类 -->
            <input type="number" class="form-control form-control-sm token" value="${tokenVal}" min="0" oninput="updateDonationBreakdown()"> <!-- 添加 form-control-sm -->
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">${PRODUCTS_CONFIG.fire.name}</label>
            <input type="number" class="form-control form-control-sm fire" value="${fireVal}" min="0" oninput="updateDonationBreakdown()">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">${PRODUCTS_CONFIG.pg3.name}</label>
            <input type="number" class="form-control form-control-sm pg3" value="${pg3Val}" min="0" oninput="updateDonationBreakdown()">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small">${PRODUCTS_CONFIG.pg6.name}</label>
            <input type="number" class="form-control form-control-sm pg6" value="${pg6Val}" min="0" oninput="updateDonationBreakdown()">
          </div>
        </div>
      `;

    return div;
};
        function addTestCard() {
            const container = document.getElementById('test-container');
            const testCard = createPrayerBlock({name: "测试姓名", token: 1, fire: 2}, 1);
            container.appendChild(testCard);
        }

        // 页面加载时添加一个测试卡片
        window.onload = function() {
            addTestCard();
        }
    </script>
</body>
</html>
