<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=80mm">
    <title>打印小票</title>
    <style>
        body {
            width: 80mm;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            margin-bottom: 10px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
        }
        .header p {
            margin: 2px 0;
            font-size: 14px;
        }
        .receipt-info {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.2;
        }
        .receipt-info p {
            margin: 4px 0;
        }
        /* 打印时才显示的支付方式文本 */
        #printMethodDisplay {
            display: none; /* 默认隐藏 */
            font-weight: bold;
            font-size: 16px;
            margin: 5px 0;
            text-align: center;
        }
        /* 屏幕上操作的下拉框 */
        #payMethodSelect {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #000;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            border-top: 1px solid #000;
            padding-top: 5px;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            font-style: italic;
            margin-top: 20px;
            border-top: 1px dashed #000;
            padding-top: 10px;
        }
        .print-button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        /* 打印时隐藏按钮和下拉框，显示文本 */
        @media print {
            .print-button, #payMethodSelect {
                display: none !important;
            }
            #printMethodDisplay {
                display: block !important;
            }
            body {
                padding: 0; /* 打印时去除边距 */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>PERSATUAN MIAO LI TANG SIBU</h2>
        <p>Tel: 013980446 (寺)</p>
        <p>JALAN PASAI SIONG OFF 25TH MILE</p>
        <p>JALAN OYA, SIBU SARAWAK</p>
        <h2>DONATION</h2>
    </div>

    <!-- 打印时显示的支付方式 -->
    <div id="printMethodDisplay"></div>

    <!-- 屏幕上操作的下拉框 -->
    <select id="payMethodSelect">
        <option value="CASH">CASH</option>
        <option value="DUITNOW">DUITNOW</option>
        <option value="BANK TRANSFER">BANK TRANSFER</option>
    </select>

    <!-- 这里填充收据详情 -->
    <div id="receiptInfo" class="receipt-info">
        <!-- 数据加载前显示 -->
        <p>等待数据...</p>
    </div>

    <!-- 这里填充贡品列表 -->
    <div id="summarySection"></div>

    <div class="footer">
        <p>愿一切吉祥如意，功德圆满</p>
        <p>欢迎再次光临</p>
    </div>

    <button id="printBtn" class="print-button">🖨️ 打印小票</button>

<script>
    // --- 工具函数 ---
    function getCurrentSystemId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('system_id') || 'system_1';
    }

    function getDailyCachedReceipts(date) {
        const SYSTEM_ID = getCurrentSystemId();
        const cacheKey = `daily_receipts_${date}_${SYSTEM_ID}`;
        const raw = localStorage.getItem(cacheKey);
        return raw ? JSON.parse(raw) : [];
    }

    // --- 主逻辑：生成报表 ---
    function loadDailyReceipts() {
        const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
        const receipts = getDailyCachedReceipts(selectedDate);

        if (receipts.length === 0) {
            document.getElementById('reportContent').innerHTML = '<p style="text-align:center; color:#888;">该日期暂无数据</p>';
            return;
        }

        let html = `<h3>日期：${selectedDate} | 共 ${receipts.length} 笔</h3>`;
        let grandTotal = 0;

        receipts.forEach((item, idx) => {
            // ✅ 关键修复：item 是 { receiptData: {...} }，所有数据都在 receiptData 下
            const d = item.receiptData;
            if (!d) {
                console.warn(`第 ${idx+1} 条缓存无效（无 receiptData）`);
                return;
            }

            // ✅ 修复时间：优先用字符串，兜底用当前时间
            let displayTime = '---';
            if (d.timestamp && typeof d.timestamp === 'string') {
                // 尝试解析常见格式
                const parsed = new Date(d.timestamp);
                if (!isNaN(parsed.getTime())) {
                    displayTime = parsed.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else {
                    console.warn(`时间格式无效: "${d.timestamp}"，收据: ${d.receiptNumber}`);
                    displayTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            }

            // ✅ 修复金额：必须用 d.totalAmount
            const totalAmount = parseFloat(d.totalAmount) || 0;
            grandTotal += totalAmount;

            // 支付方式
            const payMethod = (d.paymentMethod || 'CASH').toUpperCase();

            // 手机号处理
            const phone = (d.phoneNumber || '').replace(/[-\s]/g, '');

            // 智能汇总贡品
            let counts = { token: 0, fire: 0, pg3: 0, pg6: 0 };
            if (Array.isArray(d.data)) {
                d.data.forEach(p => {
                    counts.token += parseInt(p.token) || 0;
                    counts.fire += parseInt(p.fire) || 0;
                    counts.pg3 += parseInt(p.pg3) || 0;
                    counts.pg6 += parseInt(p.pg6) || 0;
                });
            }

            const itemStr = [];
            if (counts.token > 0) itemStr.push(`令牌 × ${counts.token}`);
            if (counts.fire > 0) itemStr.push(`护摩 × ${counts.fire}`);
            if (counts.pg3 > 0) itemStr.push(`纸金3 × ${counts.pg3}`);
            if (counts.pg6 > 0) itemStr.push(`纸金6 × ${counts.pg6}`);
            const offeringText = itemStr.length > 0 
                ? itemStr.join(' | ') 
                : (d.sponsorAmount > 0 ? `随喜 RM ${d.sponsorAmount}` : '无明细');

            // ✅ 生成 HTML
            html += `
                <div class="receipt-item">
                    <div class="row-main">
                        <div class="left-info">
                            收据编号: <strong>${d.receiptNumber || 'N/A'}</strong> | 
                            阳上报恩: <strong>${d.mainName || '匿名'}</strong> | 
                            手机号: <span style="font-family:monospace">${phone}</span>
                        </div>
                        <div class="right-info">
                            ${payMethod} - RM ${totalAmount.toFixed(2)} • ${displayTime}
                        </div>
                    </div>

                    <div class="row-detail">
                        <span class="label">法会:</span> ${d.dharmaType || '-'} | 
                        <span class="label">供奉:</span> ${offeringText}
                    </div>
                </div>
            `;
        });

        html += `<div class="total-amount">总计金额: RM ${grandTotal.toFixed(2)}</div>`;
        html += generateSummaryTable(receipts);

        document.getElementById('reportContent').innerHTML = html;
    }

    // --- 生成底部统计表 ---
    function generateSummaryTable(receipts) {
        let stats = { token: 0, fire: 0, pg3: 0, pg6: 0 };

        receipts.forEach(item => {
            const d = item.receiptData;
            if (!d) return;
            if (Array.isArray(d.data)) {
                d.data.forEach(p => {
                    stats.token += parseInt(p.token) || 0;
                    stats.fire += parseInt(p.fire) || 0;
                    stats.pg3 += parseInt(p.pg3) || 0;
                    stats.pg6 += parseInt(p.pg6) || 0;
                });
            }
        });

        if (stats.token === 0 && stats.fire === 0 && stats.pg3 === 0 && stats.pg6 === 0) {
            return '';
        }

        return `
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>项目</th>
                        <th style="text-align:center;">总数量</th>
                    </tr>
                </thead>
                <tbody>
                    ${stats.token > 0 ? `<tr><td>祈福令牌</td><td class="count-col">${stats.token}</td></tr>` : ''}
                    ${stats.fire > 0 ? `<tr><td>小护摩片</td><td class="count-col">${stats.fire}</td></tr>` : ''}
                    ${stats.pg3 > 0 ? `<tr><td>纸金 3</td><td class="count-col">${stats.pg3}</td></tr>` : ''}
                    ${stats.pg6 > 0 ? `<tr><td>纸金 6</td><td class="count-col">${stats.pg6}</td></tr>` : ''}
                </tbody>
            </table>
        `;
    }

    function printSummary() { window.print(); }

    function clearCache() {
        if (confirm('确定要清空今日数据吗？')) {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const SYSTEM_ID = getCurrentSystemId();
            localStorage.removeItem(`daily_receipts_${selectedDate}_${SYSTEM_ID}`);
            loadDailyReceipts();
        }
    }

    // 初始化
    window.onload = function() {
        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
        loadDailyReceipts();
    };
</script>
</body>
</html>
