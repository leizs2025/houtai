<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=80mm">
    <title>打印小票</title>
    <style>
        body {
            width: 80mm;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            margin-bottom: 10px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
        }
        .header p {
            margin: 2px 0;
            font-size: 14px;
        }
        .receipt-info {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.2;
        }
        .receipt-info p {
            margin: 4px 0;
        }
        /* 打印时才显示的支付方式文本 */
        #printMethodDisplay {
            display: none; /* 默认隐藏 */
            font-weight: bold;
            font-size: 16px;
            margin: 5px 0;
            text-align: center;
        }
        /* 屏幕上操作的下拉框 */
        #payMethodSelect {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #000;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            border-top: 1px solid #000;
            padding-top: 5px;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            font-style: italic;
            margin-top: 20px;
            border-top: 1px dashed #000;
            padding-top: 10px;
        }
        .print-button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        /* 打印时隐藏按钮和下拉框，显示文本 */
        @media print {
            .print-button, #payMethodSelect {
                display: none !important;
            }
            #printMethodDisplay {
                display: block !important;
            }
            body {
                padding: 0; /* 打印时去除边距 */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>PERSATUAN MIAO LI TANG SIBU</h2>
        <p>Tel: 013980446 (寺)</p>
        <p>JALAN PASAI SIONG OFF 25TH MILE</p>
        <p>JALAN OYA, SIBU SARAWAK</p>
        <h2>DONATION</h2>
    </div>

    <!-- 打印时显示的支付方式 -->
    <div id="printMethodDisplay"></div>

    <!-- 屏幕上操作的下拉框 -->
    <select id="payMethodSelect">
        <option value="CASH">CASH</option>
        <option value="DUITNOW">DUITNOW</option>
        <option value="BANK TRANSFER">BANK TRANSFER</option>
    </select>

    <!-- 这里填充收据详情 -->
    <div id="receiptInfo" class="receipt-info">
        <!-- 数据加载前显示 -->
        <p>等待数据...</p>
    </div>

    <!-- 这里填充贡品列表 -->
    <div id="summarySection"></div>

    <div class="footer">
        <p>愿一切吉祥如意，功德圆满</p>
        <p>欢迎再次光临</p>
    </div>

    <button id="printBtn" class="print-button">🖨️ 打印小票</button>

<script>
    // 1. 初始化：读取上次保存的支付方式
    const selectEl = document.getElementById('payMethodSelect');
    const printDisplayEl = document.getElementById('printMethodDisplay');
    const savedMethod = localStorage.getItem('payMethod') || 'CASH';
    
    selectEl.value = savedMethod;
    printDisplayEl.innerText = savedMethod;

    // 监听下拉框变化，实时保存
    selectEl.addEventListener('change', function() {
        const val = this.value;
        localStorage.setItem('payMethod', val);
        printDisplayEl.innerText = val;
    });

    // 2. 全局变量存储数据
    let currentReceiptData = null;

    // 3. 监听主程序发来的数据（只保存，不缓存）
    window.addEventListener("message", function (event) {
        try {
            const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            
            // ✅ 只保存数据到全局变量，不执行任何缓存
            currentReceiptData = data;

            // --- 填充基本信息 ---
            const currentYear = new Date().getFullYear();
            const infoHtml = `
                <p><strong>D/NO:</strong> ${data.receiptNumber || '---'}</p>
                <p><strong>时间:</strong> ${new Date().toLocaleString()}</p>
                <p><strong>主祈者:</strong> ${data.mainName || '---'}</p>
                <p><strong>电话:</strong> ${data.phoneNumber || '---'}</p>
                <p><strong>报名 ${currentYear} 年</strong> ${data.dharmaType || '---'} 祈福</p>
            `;
            document.getElementById("receiptInfo").innerHTML = infoHtml;

            // --- 计算并填充贡品 ---
            let tokenTotal = 0;
            let fireTotal = 0;
            let pg3Total = 0;
            let pg6Total = 0;
            let sponsorTotal = data.sponsorAmount || 0;

            if (Array.isArray(data.data)) {
                data.data.forEach(item => {
                    tokenTotal += (item.token || 0) * 5;
                    fireTotal += (item.fire || 0) * 1;
                    pg3Total += (item.pg3 || 0) * 3;
                    pg6Total += (item.pg6 || 0) * 6;
                });
            }

            const grandTotal = tokenTotal + fireTotal + pg3Total + pg6Total + sponsorTotal;

            const summaryHtml = `
                <div class="item-row"><span class="label">祈福令牌</span><span>5 × ${tokenTotal / 5}</span><span>${tokenTotal.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">小护摩片</span><span>1 × ${fireTotal}</span><span>${fireTotal.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">纸金 3</span><span>3 × ${pg3Total / 3}</span><span>${pg3Total.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">纸金 6</span><span>6 × ${pg6Total / 6}</span><span>${pg6Total.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">供养金</span><span>-</span><span>${sponsorTotal.toFixed(2)}</span></div>
                <div class="total-row"><span>总计</span><span>RM ${grandTotal.toFixed(2)}</span></div>
            `;
            document.getElementById("summarySection").innerHTML = summaryHtml;

        } catch (e) {
            console.error("数据解析失败", e);
            document.getElementById("receiptInfo").innerHTML = "<p>数据格式错误</p>";
        }
    });

    // 4. ✅ 打印按钮逻辑（✅ 只在这个函数里执行缓存，且只执行一次）
    document.getElementById("printBtn").addEventListener("click", () => {
        // ✅ 确保有数据才执行
        if (currentReceiptData) {
            // 将当前选择的支付方式注入数据（✅ 这是最终确定的支付方式）
            const finalData = { ...currentReceiptData, paymentMethod: selectEl.value };
            const receiptDataWithPayment = { ...finalData, timestamp: new Date().toISOString() };

            // 获取系统ID参数
            const urlParams = new URLSearchParams(window.location.search);
            const systemId = urlParams.get('system_id') || 'system_1';

            // 构建缓存键
            const today = new Date().toISOString().split('T')[0];
            const cacheKey = `daily_receipts_${today}_${systemId}`;

            // 获取现有缓存
            let cachedReceipts = JSON.parse(localStorage.getItem(cacheKey)) || [];

            // 将当前收据数据添加到缓存数组
            cachedReceipts.push({
                receiptData: receiptDataWithPayment
            });

            // 保存回缓存
            localStorage.setItem(cacheKey, JSON.stringify(cachedReceipts));
            console.log(`✅ 已将收据 ${currentReceiptData.receiptNumber} 写入缓存，支付方式: ${selectEl.value}`);
        }

        // 执行打印
        window.print();
    });
</script>
</body>
</html>
