<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=80mm">
    <title>打印小票</title>
    <style>
        body {
            width: 80mm;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            margin-bottom: 10px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
        }
        .header p {
            margin: 2px 0;
            font-size: 14px;
        }
        .receipt-info {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.2;
        }
        .receipt-info p {
            margin: 4px 0;
        }
        /* 打印时才显示的支付方式文本 */
        #printMethodDisplay {
            display: none; /* 默认隐藏 */
            font-weight: bold;
            font-size: 16px;
            margin: 5px 0;
            text-align: center;
        }
        /* 屏幕上操作的下拉框 */
        #payMethodSelect {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #000;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            border-top: 1px solid #000;
            padding-top: 5px;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            font-style: italic;
            margin-top: 20px;
            border-top: 1px dashed #000;
            padding-top: 10px;
        }
        .print-button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        /* 打印时隐藏按钮和下拉框，显示文本 */
        @media print {
            .print-button, #payMethodSelect {
                display: none !important;
            }
            #printMethodDisplay {
                display: block !important;
            }
            body {
                padding: 0; /* 打印时去除边距 */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>PERSATUAN MIAO LI TANG SIBU</h2>
        <p>Tel: 013980446 (寺)</p>
        <p>JALAN PASAI SIONG OFF 25TH MILE</p>
        <p>JALAN OYA, SIBU SARAWAK</p>
        <h2>DONATION</h2>
    </div>

    <!-- 打印时显示的支付方式 -->
    <div id="printMethodDisplay"></div>

    <!-- 屏幕上操作的下拉框 -->
    <select id="payMethodSelect">
        <option value="CASH">CASH</option>
        <option value="DUITNOW">DUITNOW</option>
        <option value="BANK TRANSFER">BANK TRANSFER</option>
    </select>

    <!-- 这里填充收据详情 -->
    <div id="receiptInfo" class="receipt-info">
        <!-- 数据加载前显示 -->
        <p>等待数据...</p>
    </div>

    <!-- 这里填充贡品列表 -->
    <div id="summarySection"></div>

    <div class="footer">
        <p>愿一切吉祥如意，功德圆满</p>
        <p>欢迎再次光临</p>
    </div>

    <button id="printBtn" class="print-button">🖨️ 打印小票</button>

<script>
    // 1. 初始化：读取上次保存的支付方式
    const selectEl = document.getElementById('payMethodSelect');
    const printDisplayEl = document.getElementById('printMethodDisplay');
    const savedMethod = localStorage.getItem('payMethod') || 'CASH';
    
    selectEl.value = savedMethod;
    printDisplayEl.innerText = savedMethod;

    // 监听下拉框变化，实时保存
    selectEl.addEventListener('change', function() {
        const val = this.value;
        localStorage.setItem('payMethod', val);
        printDisplayEl.innerText = val;
    });

    // 2. 接收主程序数据 - ✅ 添加完整调试
    window.addEventListener("message", function (event) {
        console.log('=== 收到来自主程序的数据 ===');
        console.log('原始数据:', event.data);
        
        try {
            const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            console.log('解析后的数据:', data);
            
            // 检查数据结构
            console.log('data.data:', data.data);
            console.log('data.data 类型:', Array.isArray(data.data) ? 'Array' : typeof data.data);
            console.log('data.sponsorAmount:', data.sponsorAmount);
            
            // --- 填充基本信息 ---
            const currentYear = new Date().getFullYear();
            const now = new Date();
            const formattedTime = now.toLocaleString();
            
            const infoHtml = `
                <p><strong>D/NO:</strong> ${data.receiptNumber || 'N/A'}</p>
                <p><strong>时间:</strong> ${formattedTime}</p>
                <p><strong>主祈者:</strong> ${data.mainName || '匿名'}</p>
                <p><strong>电话:</strong> ${data.phoneNumber || 'N/A'}</p>
                <p><strong>报名 ${currentYear} 年</strong> ${data.dharmaType || '-'} 祈福</p>
            `;
            document.getElementById("receiptInfo").innerHTML = infoHtml;

            // --- 重新实现计算逻辑 - ✅ 更严格的检查 ---
            let tokenTotal = 0;
            let fireTotal = 0;
            let pg3Total = 0;
            let pg6Total = 0;
            let sponsorTotal = data.sponsorAmount || 0;

            console.log('开始处理贡品数据...');
            
            if (Array.isArray(data.data)) {
                console.log('发现数组格式数据');
                data.data.forEach((item, index) => {
                    console.log(`处理第 ${index + 1} 项:`, item);
                    
                    const token = parseInt(item.token) || 0;
                    const fire = parseInt(item.fire) || 0;
                    const pg3 = parseInt(item.pg3) || 0;
                    const pg6 = parseInt(item.pg6) || 0;
                    
                    console.log(`令牌: ${token}, 护摩: ${fire}, 纸金3: ${pg3}, 纸金6: ${pg6}`);
                    
                    tokenTotal += token * 5;
                    fireTotal += fire * 1;
                    pg3Total += pg3 * 3;
                    pg6Total += pg6 * 6;
                });
            } else if (data.data && typeof data.data === 'object') {
                // 如果是单个对象格式
                console.log('发现对象格式数据');
                const item = data.data;
                const token = parseInt(item.token) || 0;
                const fire = parseInt(item.fire) || 0;
                const pg3 = parseInt(item.pg3) || 0;
                const pg6 = parseInt(item.pg6) || 0;
                
                tokenTotal += token * 5;
                fireTotal += fire * 1;
                pg3Total += pg3 * 3;
                pg6Total += pg6 * 6;
            } else {
                console.log('未找到有效的贡品数据格式');
            }

            console.log('计算结果:');
            console.log('令牌总额:', tokenTotal);
            console.log('护摩总额:', fireTotal);
            console.log('纸金3总额:', pg3Total);
            console.log('纸金6总额:', pg6Total);
            console.log('供养总额:', sponsorTotal);

            const grandTotal = tokenTotal + fireTotal + pg3Total + pg6Total + sponsorTotal;
            console.log('总金额:', grandTotal);

            // --- 生成明细文本 ---
            let detailText = '无明细';
            if (Array.isArray(data.data)) {
                const items = [];
                data.data.forEach(item => {
                    if (item.token > 0) items.push(`${item.token} 个令牌`);
                    if (item.fire > 0) items.push(`${item.fire} 个小护摩片`);
                    if (item.pg3 > 0) items.push(`${item.pg3} 张纸金3`);
                    if (item.pg6 > 0) items.push(`${item.pg6} 张纸金6`);
                });
                detailText = items.join(', ') || '无明细';
            } else if (data.data && typeof data.data === 'object') {
                const items = [];
                const item = data.data;
                if (item.token > 0) items.push(`${item.token} 个令牌`);
                if (item.fire > 0) items.push(`${item.fire} 个小护摩片`);
                if (item.pg3 > 0) items.push(`${item.pg3} 张纸金3`);
                if (item.pg6 > 0) items.push(`${item.pg6} 张纸金6`);
                detailText = items.join(', ') || '无明细';
            }

            console.log('明细文本:', detailText);

            // --- 更新显示 ---
            const summaryHtml = `
                <div class="item-row"><span class="label">祈福令牌</span><span>5 × ${(tokenTotal / 5).toFixed(0)}</span><span>${tokenTotal.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">小护摩片</span><span>1 × ${fireTotal.toFixed(0)}</span><span>${fireTotal.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">纸金 3</span><span>3 × ${(pg3Total / 3).toFixed(0)}</span><span>${pg3Total.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">纸金 6</span><span>6 × ${(pg6Total / 6).toFixed(0)}</span><span>${pg6Total.toFixed(2)}</span></div>
                <div class="item-row"><span class="label">供养金</span><span>-</span><span>${sponsorTotal.toFixed(2)}</span></div>
                <div class="total-row"><span>总计</span><span>RM ${grandTotal.toFixed(2)}</span></div>
            `;
            document.getElementById("summarySection").innerHTML = summaryHtml;

            // 3. 打印按钮
            document.getElementById("printBtn").onclick = function() {
                const now = new Date();
                const receiptToCache = {
                    receiptNumber: data.receiptNumber || 'N/A',
                    mainName: data.mainName || '匿名', 
                    phoneNumber: data.phoneNumber || 'N/A',
                    dharmaType: data.dharmaType || '-',
                    totalAmount: grandTotal,
                    paymentMethod: selectEl.value,
                    timestamp: now.toLocaleString(),
                    details: detailText,
                    amounts: { token: tokenTotal, fire: fireTotal, pg3: pg3Total, pg6: pg6Total, sponsor: sponsorTotal },
                    itemData: data.data || []
                };

                const urlParams = new URLSearchParams(window.location.search);
                const systemId = urlParams.get('system_id') || 'system_1';
                const today = new Date().toISOString().split('T')[0];
                const cacheKey = `daily_receipts_${today}_${systemId}`;

                let cachedReceipts = JSON.parse(localStorage.getItem(cacheKey)) || [];
                cachedReceipts.push({ receiptData: receiptToCache });
                localStorage.setItem(cacheKey, JSON.stringify(cachedReceipts));
                
                console.log(`✅ 已缓存收据:`, receiptToCache);

                window.print();
            };

        } catch (e) {
            console.error("数据处理失败", e);
            document.getElementById("receiptInfo").innerHTML = "<p>数据格式错误: " + e.message + "</p>";
        }
    });
</script>
</body>
</html>
