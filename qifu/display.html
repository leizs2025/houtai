<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>实时报名展示</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      padding: 20px;
      background-color: #fff8e7;
    }
    .paid { color: green; font-weight: bold; }
    .unpaid { color: red; }
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .delete-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .delete-btn:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>
  <div class="container-fluid" style="max-width: 1400px;">
    <h3 class="mb-4 text-center">📋 超度 / 祈福 实时报名列表</h3>

    <!-- 标签导航 -->
    <ul class="nav nav-tabs" id="formTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" id="chaodu-tab" data-bs-toggle="tab" data-bs-target="#chaodu-pane" type="button" role="tab">🪔 超度报名</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="qifu-tab" data-bs-toggle="tab" data-bs-target="#qifu-pane" type="button" role="tab">🙏 祈福报名</button>
      </li>
    </ul>

    <!-- 内容区 -->
    <div class="tab-content mt-3">
      <!-- 超度面板 -->
      <div class="tab-pane fade show active" id="chaodu-pane" role="tabpanel">
        <div class="p-4 bg-white shadow-sm rounded border">
          <div class="filter-bar">
            <input id="chaoduSearch" class="form-control" placeholder="手机号">
            <select id="chaoduType" class="form-select">
              <option value="">全部法会</option>
              <option value="清明节">清明节</option>
              <option value="中元节">中元节</option>
              <option value="不空羂索">不空羂索</option>
              <option value="感恩护法">感恩护法</option>
            </select>
            <select id="chaoduPaymentStatus" class="form-select">
              <option value="">全部状态</option>
              <option value="paid">已付款</option>
              <option value="unpaid">未付款</option>
            </select>
            <button onclick="applyFilter('chaodu')" class="btn btn-sm btn-primary">筛选</button>
            <button onclick="resetFilter('chaodu')" class="btn btn-sm btn-secondary">全部</button>
          </div>
          <div class="table-responsive">
            <table class="table table-bordered table-striped">
              <thead class="table-light">
                <tr><th>#</th><th>表格填写者</th><th>手机号</th><th>是否已付款</th><th>收款人</th><th>操作</th></tr>
              </thead>
              <tbody id="chaoduTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 祈福面板 -->
      <div class="tab-pane fade" id="qifu-pane" role="tabpanel">
        <div class="p-4 bg-white shadow-sm rounded border">
          <div class="filter-bar">
            <input id="qifuSearch" class="form-control" placeholder="手机号">
            <select id="qifuType" class="form-select">
              <option value="">全部法会</option>
              <option value="清明节">清明节</option>
              <option value="中元节">中元节</option>
              <option value="红财神">红财神</option>
              <option value="不空羂索">不空羂索</option>
              <option value="感恩护法">感恩护法</option>
            </select>
            <select id="qifuPaymentStatus" class="form-select">
              <option value="">全部状态</option>
              <option value="paid">已付款</option>
              <option value="unpaid">未付款</option>
            </select>
            <button onclick="applyFilter('qifu')" class="btn btn-sm btn-primary">筛选</button>
            <button onclick="resetFilter('qifu')" class="btn btn-sm btn-secondary">全部</button>
          </div>
          <div class="table-responsive">
            <table class="table table-bordered table-striped">
              <thead class="table-light">
                <tr><th>#</th><th>表格填写者</th><th>手机号</th><th>是否已付款</th><th>收款人</th><th>操作</th></tr>
              </thead>
              <tbody id="qifuTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 主要脚本 -->
  <script>
    async function loadSystemData(system, tableId, filter = {}) {
      let endpoint = system === "chaodu" ? "admin-chaodu" : "admin-qifu";

      try {
        const res = await fetch(`https://form.gealarm2012.workers.dev/${endpoint}?list=1`);
        const dataList = await res.json();

        const tbody = document.getElementById(tableId);
        if (!tbody) return;

        tbody.innerHTML = "";
        const phoneFilter = filter.phone || "";
        const typeFilter = system === "chaodu" ? filter.festival || "" : filter.dharmaType || "";
        const paymentStatusFilter = filter.paymentStatus || "";

        const filtered = dataList.filter(item => {
          const matchPhone = !phoneFilter || String(item.phoneNumber || '').includes(phoneFilter);
          const matchType = !typeFilter || (
            system === "chaodu"
              ? item.festival === typeFilter
              : item.dharmaType === typeFilter
          );
          
          const paid = String(item.receiptNumber || "").trim();
          let matchPaymentStatus = true;
          if (paymentStatusFilter === "paid") {
            matchPaymentStatus = !!paid;
          } else if (paymentStatusFilter === "unpaid") {
            matchPaymentStatus = !paid;
          }
          
          return matchPhone && matchType && matchPaymentStatus;
        });

        filtered.forEach((item, index) => {
          const paid = String(item.receiptNumber || "").trim();
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${item.mainName || "-"}</td>
            <td>${item.phoneNumber || "-"}</td>
            <td class="${paid ? 'paid' : 'unpaid'}">${paid ? "✔ 已付款" : "❌ 未付款"}</td>
            <td>${paid ? (item.admin || "—") : "—"}</td>
            <td>
              ${!paid ? `<button class="delete-btn" onclick="confirmDelete('${item.phoneNumber}', '${system}')">删除</button>` : "-"}
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error(`❌ 加载 ${system} 系统失败`, err);
        const tbody = document.getElementById(tableId);
        if (tbody) {
          tbody.innerHTML = `<tr><td colspan="6" class="text-danger">加载失败</td></tr>`;
        }
      }
    }

    function confirmDelete(phoneNumber, system) {
      if (confirm("确定要删除这条记录吗？此操作不可撤销！")) {
        deleteItem(phoneNumber, system);
      }
    }

    async function deleteItem(phoneNumber, system) {
      try {
        // 根据系统类型选择不同的API端点
        const endpoint = system === "chaodu" ? "admin-chaodu" : "admin-qifu";
        
        // 根据系统类型构建请求数据
        let requestData;
        if (system === "chaodu") {
          // 超度系统的删除需要action和phone参数
          requestData = {
            action: "delete",
            phone: phoneNumber
          };
        } else {
          // 祈福系统的删除需要method和phoneNumber参数
          requestData = {
            method: "DELETE",
            phoneNumber: phoneNumber
          };
        }

        const res = await fetch(`https://form.gealarm2012.workers.dev/${endpoint}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestData)
        });

        const response = await res.json();
        
        if (response.success) {
          alert("删除成功！");
          // 重新加载数据
          const phone = document.getElementById(system + "Search").value.trim();
          let filter = { phone: phone };

          if (system === "qifu") {
            filter.dharmaType = document.getElementById("qifuType").value.trim();
            filter.paymentStatus = document.getElementById("qifuPaymentStatus").value.trim();
          }
          if (system === "chaodu") {
            filter.festival = document.getElementById("chaoduType").value.trim();
            filter.paymentStatus = document.getElementById("chaoduPaymentStatus").value.trim();
          }

          loadSystemData(system, system + "Table", filter);
        } else {
          alert(response.message || "删除失败，请重试！");
        }
      } catch (err) {
        console.error(`❌ 删除 ${system} 项目失败`, err);
        alert("删除失败，请检查网络连接！");
      }
    }

    function applyFilter(system) {
      const phone = document.getElementById(system + "Search").value.trim();
      let filter = { phone: phone };

      if (system === "qifu") {
        filter.dharmaType = document.getElementById("qifuType").value.trim();
        filter.paymentStatus = document.getElementById("qifuPaymentStatus").value.trim();
      }
      if (system === "chaodu") {
        filter.festival = document.getElementById("chaoduType").value.trim();
        filter.paymentStatus = document.getElementById("chaoduPaymentStatus").value.trim();
      }

      loadSystemData(system, system + "Table", filter);
    }

    function resetFilter(system) {
      document.getElementById(system + "Search").value = "";
      if (system === "qifu") {
        document.getElementById("qifuType").value = "";
        document.getElementById("qifuPaymentStatus").value = "";
      }
      if (system === "chaodu") {
        document.getElementById("chaoduType").value = "";
        document.getElementById("chaoduPaymentStatus").value = "";
      }
      loadSystemData(system, system + "Table");
    }

    // 初始加载
    loadSystemData("qifu", "qifuTable");
    loadSystemData("chaodu", "chaoduTable");
  </script>
</body>
</html>
