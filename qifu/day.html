<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福日汇总报表</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; font-size: 14px; }
        .header { text-align: center; margin-bottom: 20px; }
        .controls { margin-bottom: 20px; text-align: center; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .summary-table th, .summary-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .summary-table th { background-color: #f0f0f0; }
        .total-row { font-weight: bold; background-color: #e0e0e0; }
        /* 新增：汇总表格大号字体样式 */
        .summary-table td:last-child {
            font-size: 1.2em; /* 加大字体 */
            font-weight: bold; /* 加粗 */
            text-align: center;
        }
        @media print {
            body { margin: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>祈福日汇总报表</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <button onclick="loadDailyReceipts()">加载收据</button>
            <button onclick="printSummary()">打印汇总</button>
            <button onclick="clearCache()">清空缓存</button>
            <button onclick="exportToExcel()">导出Excel</button>
        </div>
    </div>

    <!-- 收据列表区域 -->
    <div id="receiptList"></div>
    
    <!-- 汇总表格区域 -->
    <div id="summaryTable"></div>

    <script>
        // --- 1. 通用工具函数 ---
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            const systemId = urlParams.get('system_id');
            if (systemId && systemId.trim()) {
                return systemId.trim();
            }
            const rememberedId = localStorage.getItem('current_active_system_id');
            if (rememberedId) {
                return rememberedId;
            }
            return 'system_1';
        }

        function getDailyCachedReceipts(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            return JSON.parse(localStorage.getItem(cacheKey) || '[]');
        }

        function clearDailyCache(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            localStorage.removeItem(cacheKey);
        }

        // --- 2. 主逻辑：加载并渲染收据 ---
        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const receipts = getDailyCachedReceipts(selectedDate);

            if (receipts.length === 0) {
                document.getElementById('receiptList').innerHTML = '<p style="text-align:center; color:#666;">该日期没有收据记录</p>';
                document.getElementById('summaryTable').innerHTML = '';
                return;
            }

            // 生成收据列表 HTML
            let html = `<h3 style="border-bottom:1px solid #ccc; padding-bottom:10px;">
                            ${selectedDate} 汇总 (${receipts.length} 笔)
                        </h3>`;

            receipts.forEach((item) => {
                const d = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // 格式化手机号 (正则处理空格)
                const rawPhone = d.phoneNumber || "";
                const phone = rawPhone.replace(/(\d{2})(\d{4})(\d{4})/, '$1 $2 $3');
                const amount = d.total ? parseFloat(d.total).toFixed(2) : "0.00";

                // ✅ 修改排版：手机号独立一行，统一加粗
                html += `
                    <div style="margin-bottom:10px; font-size:14px; border-bottom:1px dashed #eee; padding-bottom:8px;">
                        <!-- 第一行：编号与名字 -->
                        <div style="margin-bottom:4px;">
                            <span style="font-weight:bold;">收据编号: ${d.receiptNumber || 'N/A'}</span> 
                            <span style="margin-left:10px;">| 阳上报恩: <strong>${d.mainName || '匿名'}</strong></span>
                        </div>

                        <!-- 第二行：手机号码（独立一行，统一加粗） -->
                        <div style="font-weight:bold; margin-bottom:4px;">
                            手机号码：${phone}
                        </div>

                        <!-- 第三行：金额与时间 -->
                        <div style="text-align:right; color:#333;">
                            <span>Cash - RM ${amount}</span>
                            <span style="font-size:12px; color:#888; margin-left:10px;">• ${time}</span>
                        </div>
                    </div>
                `;
            });

            // 生成下方的汇总表
            const summaryHtml = generateSummaryTable(receipts);
            
            document.getElementById('receiptList').innerHTML = html;
            document.getElementById('summaryTable').innerHTML = summaryHtml;
            document.getElementById('datePicker').value = selectedDate;
        }

        // --- 3. 智能汇总表生成器 ---
        function generateSummaryTable(receipts) {
            let stats = {
                token: { count: 0, label: "祈福令牌" },
                fire:  { count: 0, label: "小护摩片" }, 
                pg3:   { count: 0, label: "纸金 3" },
                pg6:   { count: 0, label: "纸金 6" }
            };

            let totalAmount = 0;
            let totalReceipts = receipts.length;

            receipts.forEach(item => {
                const data = item.receiptData;
                totalAmount += parseFloat(data.total || 0);

                if (data.data && Array.isArray(data.data)) {
                    data.data.forEach(p => {
                        stats.token.count += +p.token || 0;
                        stats.fire.count  += +p.fire  || 0;
                        stats.pg3.count   += +p.pg3   || 0;
                        stats.pg6.count   += +p.pg6   || 0;
                    });
                }
            });

            let itemsStr = [];
            if (stats.token.count > 0) itemsStr.push(`${stats.token.label}×${stats.token.count}`);
            if (stats.fire.count > 0)  itemsStr.push(`${stats.fire.label}×${stats.fire.count}`);
            if (stats.pg3.count > 0)   itemsStr.push(`${stats.pg3.label}×${stats.pg3.count}`);
            if (stats.pg6.count > 0)   itemsStr.push(`${stats.pg6.label}×${stats.pg6.count}`);
            
            const itemsText = itemsStr.length > 0 ? itemsStr.join(' | ') : '无贡品记录';

            return `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th colspan="2" style="background:#f0f0f0">每日汇总统计</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>统计项目</strong></td>
                            <td>${itemsText}</td>
                        </tr>
                        <tr>
                            <td><strong>收据张数</strong></td>
                            <td>${totalReceipts} 张</td>
                        </tr>
                        <tr class="total-row">
                            <td><strong>总计金额</strong></td>
                            <td>RM ${totalAmount.toFixed(2)}</td>
                        </tr>
                    </tbody>
                </table>
            `;
        }

        // --- 4. 其他功能 ---
        function printSummary() { window.print(); }
        
        function clearCache() {
            if (confirm('确定要清空今日缓存数据吗？')) {
                const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
                clearDailyCache(selectedDate);
                alert('缓存已清空！');
                loadDailyReceipts();
            }
        }

        function exportToExcel() { alert('Excel导出功能待实现'); }

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('datePicker').value = today;
            loadDailyReceipts();
        };
    </script>
</body>
</html>
