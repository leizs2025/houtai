<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福日汇总报表</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; font-size: 14px; background: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; text-align: center; }
        
        /* 收据条目样式 */
        .receipt-item { 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
            border-bottom: 1px dashed #ccc; 
        }
        
        /* 第一行：左右两端对齐 */
        .row-main { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 5px; 
        }

        /* 左侧信息：紧凑排列 */
        .info-left {
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
        }
        .info-left span {
            margin-right: 5px; /* 分隔符间距 */
        }

        /* 右侧支付信息：加大加粗 */
        .info-right {
            font-size: 16px; /* 加大 */
            font-weight: 800; /* 加粗 */
            color: #000;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        /* 第二行：明细信息 */
        .row-detail { 
            font-size: 13px; 
            color: #555; 
            margin-top: 5px;
        }
        .dharma-label { font-weight: bold; color: #000; }
        .offerings-text { color: #c0392b; font-weight: 500; } /* 供奉文字红色 */

        /* 汇总表格样式 */
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .summary-table th, .summary-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .summary-table th { background-color: #f0f0f0; }
        .summary-table td.count-col { 
            font-size: 1.2em; 
            font-weight: bold; 
            text-align: center; 
            background-color: #e8f4fd;
        }
        .total-amount { font-size: 1.3em; color: #d9534f; text-align: right; margin-top: 10px; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            body { margin: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 祈福日结报表</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <button onclick="loadDailyReceipts()">🔄 加载数据</button>
            <button onclick="printSummary()">🖨️ 打印报表</button>
            <button onclick="clearCache()" style="color:red;">⚠️ 清空缓存</button>
        </div>
    </div>

    <div id="reportContent"></div>

    <script>
        // --- 工具函数 ---
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('system_id') || 'system_1';
        }

        function getDailyCachedReceipts(date) {
            const SYSTEM_ID = getCurrentSystemId();
            const cacheKey = `daily_receipts_${date}_${SYSTEM_ID}`;
            return JSON.parse(localStorage.getItem(cacheKey) || '[]');
        }

        // --- 主逻辑：生成报表 ---
        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const receipts = getDailyCachedReceipts(selectedDate);

            if (receipts.length === 0) {
                document.getElementById('reportContent').innerHTML = '<p style="text-align:center; color:#888;">该日期暂无数据</p>';
                return;
            }

            let html = `<h3>日期：${selectedDate} | 共 ${receipts.length} 笔</h3>`;
            
            // 全局统计（用于底部的汇总表）
            let globalStats = { token: 0, fire: 0, pg3: 0, pg6: 0 };
            let grandTotal = 0;

            receipts.forEach((item) => {
                const d = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const totalAmount = parseFloat(d.total || 0).toFixed(2);
                grandTotal += parseFloat(totalAmount);

                // 支付方式
                const payMethod = d.transferSlip ? "Transfer" : "Cash";
                
                // 手机号处理：去除所有空格，不格式化
                let phone = d.phoneNumber || 'N/A';
                phone = phone.replace(/\s/g, ''); 

                // --- 贡品汇总逻辑 (关键修改) ---
                // 1. 统计这一笔订单里的贡品总数
                let orderStats = { token: 0, fire: 0, pg3: 0, pg6: 0, hasItems: false };
                
                if (d.data && Array.isArray(d.data)) {
                    d.data.forEach(p => {
                        orderStats.token += parseInt(p.token) || 0;
                        orderStats.fire += parseInt(p.fire) || 0;
                        orderStats.pg3 += parseInt(p.pg3) || 0;
                        orderStats.pg6 += parseInt(p.pg6) || 0;
                        
                        // 累加到全局统计
                        globalStats.token += orderStats.token;
                        globalStats.fire += orderStats.fire;
                        globalStats.pg3 += orderStats.pg3;
                        globalStats.pg6 += orderStats.pg6;

                        if(p.token > 0 || p.fire > 0 || p.pg3 > 0 || p.pg6 > 0) orderStats.hasItems = true;
                    });
                }

                // 2. 生成汇总后的文字字符串 (例如：令牌 x 2, 护摩 x 14)
                let offerParts = [];
                if (orderStats.token > 0) offerParts.push(`令牌 × ${orderStats.token}`);
                if (orderStats.fire > 0) offerParts.push(`护摩 × ${orderStats.fire}`);
                if (orderStats.pg3 > 0) offerParts.push(`纸金3 × ${orderStats.pg3}`);
                if (orderStats.pg6 > 0) offerParts.push(`纸金6 × ${orderStats.pg6}`);

                // 如果有随喜但没有贡品，或者只是纯随喜
                if (offerParts.length === 0) {
                    if (d.sponsorAmount > 0) {
                        offerParts.push(`随喜 RM ${d.sponsorAmount}`);
                    } else {
                        offerParts.push("无具体贡品");
                    }
                }
                
                const offeringsText = offerParts.join(', ');

                // 3. 拼接 HTML
                html += `
                    <div class="receipt-item">
                        <!-- 第一行：左紧右粗 -->
                        <div class="row-main">
                            <div class="info-left">
                                <span>收据编号: <strong>${d.receiptNumber || 'N/A'}</strong></span>
                                <span>|</span>
                                <span>阳上报恩: <strong>${d.mainName || '匿名'}</strong></span>
                                <span>|</span>
                                <span>手机号: <strong>${phone}</strong></span>
                            </div>
                            <div class="info-right">
                                ${payMethod} - RM ${totalAmount} • ${time}
                            </div>
                        </div>

                        <!-- 第二行：法会 + 汇总贡品 -->
                        <div class="row-detail">
                            <span class="dharma-label">法会: ${d.dharmaType || '-'}</span> | 
                            <span class="offerings-text">供奉: ${offeringsText}</span>
                        </div>
                    </div>
                `;
            });

            // 添加总计
            html += `<div class="total-amount">总计金额: RM ${grandTotal.toFixed(2)}</div>`;

            // 生成下方的统计表
            html += generateSummaryTable(globalStats);

            document.getElementById('reportContent').innerHTML = html;
        }

        // --- 生成底部统计表 ---
        function generateSummaryTable(stats) {
            // 只有当有物品被统计时才显示表格
            if (stats.token === 0 && stats.fire === 0 && stats.pg3 === 0 && stats.pg6 === 0) {
                return '';
            }

            return `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th style="text-align:center;">总数量</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stats.token > 0 ? `<tr><td>祈福令牌</td><td class="count-col">${stats.token}</td></tr>` : ''}
                        ${stats.fire > 0 ? `<tr><td>小护摩片</td><td class="count-col">${stats.fire}</td></tr>` : ''}
                        ${stats.pg3 > 0 ? `<tr><td>纸金 3</td><td class="count-col">${stats.pg3}</td></tr>` : ''}
                        ${stats.pg6 > 0 ? `<tr><td>纸金 6</td><td class="count-col">${stats.pg6}</td></tr>` : ''}
                    </tbody>
                </table>
            `;
        }

        // --- 其他功能 ---
        function printSummary() { window.print(); }

        function clearCache() {
            if (confirm('确定要清空今日数据吗？')) {
                const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
                const SYSTEM_ID = getCurrentSystemId();
                localStorage.removeItem(`daily_receipts_${selectedDate}_${SYSTEM_ID}`);
                loadDailyReceipts();
            }
        }

        // 初始化
        window.onload = function() {
            document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
            loadDailyReceipts();
        };
    </script>
</body>
</html>
