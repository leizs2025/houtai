<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福日汇总报表</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; font-size: 14px; background: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; text-align: center; }
        
        /* 收据条目样式 */
        .receipt-item { 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
            border-bottom: 1px dashed #ccc; 
        }
        
        /* 第一行：左右两端对齐 */
        .row-main { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 5px; 
        }
        
        /* 左侧信息连在一起 */
        .left-info { font-size: 14px; font-weight: normal; }
        
        /* 右侧支付信息加大加粗 */
        .right-info { font-size: 16px; font-weight: bold; text-align: right; }
        .highlight-phone { font-family: monospace; }

        /* 第二行：法会和贡品 */
        .row-detail { 
            font-size: 14px; 
            color: #333; 
            border-top: 1px solid #eee;
            padding-top: 5px;
            margin-top: 5px;
        }
        .label { color: #555; }
        .value { font-weight: 500; }

        /* 汇总表格 */
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .summary-table th, .summary-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .summary-table th { background-color: #f0f0f0; }
        .summary-table td { text-align: center; font-weight: bold; }
        .total-amount { font-size: 1.4em; color: #d9534f; text-align: right; margin-top: 20px; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            body { margin: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 祈福日结报表</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <button onclick="loadDailyReceipts()">🔄 加载数据</button>
            <button onclick="printSummary()">🖨️ 打印报表</button>
            <button onclick="clearCache()" style="color:red;">⚠️ 清空缓存</button>
        </div>
    </div>

    <div id="reportContent"></div>

    <script>
        // --- 工具函数 ---
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('system_id') || 'system_1';
        }

        function getDailyCachedReceipts(date) {
            const SYSTEM_ID = getCurrentSystemId();
            const cacheKey = `daily_receipts_${date}_${SYSTEM_ID}`;
            return JSON.parse(localStorage.getItem(cacheKey) || '[]');
        }

        // --- 主逻辑：生成报表 ---
        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const receipts = getDailyCachedReceipts(selectedDate);

            if (receipts.length === 0) {
                document.getElementById('reportContent').innerHTML = '<p style="text-align:center; color:#888;">该日期暂无数据</p>';
                return;
            }

            let html = `<h3>日期：${selectedDate} | 共 ${receipts.length} 笔</h3>`;
            let grandTotal = 0;

            // 初始化统计表
            let summaryStats = { token: 0, fire: 0, pg3: 0, pg6: 0 };

            receipts.forEach((item) => {
                const d = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const totalAmount = parseFloat(d.total || 0).toFixed(2);
                grandTotal += parseFloat(totalAmount);

                // 支付方式
                const payMethod = d.transferSlip ? "Transfer" : "Cash";
                // 手机号：直接显示，不加空格
                const phone = d.phoneNumber || 'N/A';

                // --- 核心修复：智能汇总贡品 ---
                let itemStats = { token: 0, fire: 0, pg3: 0, pg6: 0 };
                
                if (d.data && Array.isArray(d.data)) {
                    d.data.forEach(p => {
                        // 累加当前单据的数量
                        itemStats.token += parseInt(p.token) || 0;
                        itemStats.fire += parseInt(p.fire) || 0;
                        itemStats.pg3 += parseInt(p.paperGold3 || p.pg3) || 0; // 兼容旧变量名
                        itemStats.pg6 += parseInt(p.paperGold6 || p.pg6) || 0; // 兼容旧变量名

                        // 累加全局统计
                        summaryStats.token += parseInt(p.token) || 0;
                        summaryStats.fire += parseInt(p.fire) || 0;
                        summaryStats.pg3 += parseInt(p.paperGold3 || p.pg3) || 0;
                        summaryStats.pg6 += parseInt(p.paperGold6 || p.pg6) || 0;
                    });
                }

                // 生成贡品字符串 (例如：令牌 × 2 | 护摩 × 14)
                let贡品List = [];
                if (itemStats.token > 0) 贡品List.push(`令牌 × ${itemStats.token}`);
                if (itemStats.fire > 0) 贡品List.push(`护摩 × ${itemStats.fire}`);
                if (itemStats.pg3 > 0) 贡品List.push(`纸金3 × ${itemStats.pg3}`);
                if (itemStats.pg6 > 0) 贡品List.push(`纸金6 × ${itemStats.pg6}`);

                const 贡品Text = 贡品List.length > 0 ? 贡品List.join(' | ') : '无具体贡品';

                html += `
                    <div class="receipt-item">
                        <!-- 第一行：左右分布 -->
                        <div class="row-main">
                            <div class="left-info">
                                收据编号: <strong>${d.receiptNumber || 'N/A'}</strong> | 
                                阳上报恩: <strong>${d.mainName || '匿名'}</strong> | 
                                手机号: <span class="highlight-phone">${phone}</span>
                            </div>
                            <div class="right-info">
                                ${payMethod} - RM ${totalAmount} • ${time}
                            </div>
                        </div>

                        <!-- 第二行：法会与汇总贡品 -->
                        <div class="row-detail">
                            <span class="label">法会:</span> <span class="value">${d.dharmaType || '-'}</span> &nbsp;|&nbsp; 
                            <span class="label">供奉:</span> <span class="value" style="color:#d9534f;">${贡品Text}</span>
                            ${d.sponsorAmount > 0 ? `&nbsp;|&nbsp; <span class="label">供养金:</span> RM ${d.sponsorAmount}` : ''}
                        </div>
                    </div>
                `;
            });

            html += `<div class="total-amount">总计金额: RM ${grandTotal.toFixed(2)}</div>`;
            html += generateSummaryTable(summaryStats);
            document.getElementById('reportContent').innerHTML = html;
        }

        // --- 生成底部统计表 ---
        function generateSummaryTable(stats) {
            if (stats.token === 0 && stats.fire === 0 && stats.pg3 === 0 && stats.pg6 === 0) return '';

            return `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th>总数量</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stats.token > 0 ? `<tr><td>祈福令牌</td><td>${stats.token}</td></tr>` : ''}
                        ${stats.fire > 0 ? `<tr><td>小护摩片</td><td>${stats.fire}</td></tr>` : ''}
                        ${stats.pg3 > 0 ? `<tr><td>纸金 3</td><td>${stats.pg3}</td></tr>` : ''}
                        ${stats.pg6 > 0 ? `<tr><td>纸金 6</td><td>${stats.pg6}</td></tr>` : ''}
                    </tbody>
                </table>
            `;
        }

        function printSummary() { window.print(); }

        function clearCache() {
            if (confirm('确定要清空今日数据吗？')) {
                const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
                const SYSTEM_ID = getCurrentSystemId();
                localStorage.removeItem(`daily_receipts_${selectedDate}_${SYSTEM_ID}`);
                loadDailyReceipts();
            }
        }

        window.onload = function() {
            document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
            loadDailyReceipts();
        };
    </script>
</body>
</html>
