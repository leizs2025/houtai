<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福日汇总报表</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; font-size: 14px; background: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; text-align: center; }
        
        /* 收据条目样式 */
        .receipt-item { 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
            border-bottom: 1px dashed #ccc; 
        }
        .row-main { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .row-details { font-size: 13px; color: #555; padding-left: 2px; }
        .highlight-phone { font-weight: bold; } /* 手机号加粗 */
        
        /* 汇总表格样式 */
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .summary-table th, .summary-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .summary-table th { background-color: #f0f0f0; }
        /* 总数加大字体 */
        .summary-table td.total-cell { font-size: 1.2em; font-weight: bold; text-align: center; }
        
        @media print {
            .no-print { display: none; }
            body { margin: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>祈福日汇总报表</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <button onclick="loadDailyReceipts()">加载收据</button>
            <button onclick="printSummary()">打印汇总</button>
            <button onclick="clearCache()">清空缓存</button>
        </div>
    </div>

    <div id="receiptList"></div>
    <div id="summaryTable"></div>

    <script>
        // --- 工具函数 ---
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('system_id')?.trim() || 'system_1';
        }

        function getDailyCachedReceipts(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            return JSON.parse(localStorage.getItem(cacheKey) || '[]');
        }

        function clearDailyCache(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            localStorage.removeItem(`daily_receipts_${today}_${SYSTEM_ID}`);
        }

        // --- 主逻辑：加载收据 ---
        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const receipts = getDailyCachedReceipts(selectedDate);

            if (receipts.length === 0) {
                document.getElementById('receiptList').innerHTML = '<p style="text-align:center;">该日期没有收据记录</p>';
                document.getElementById('summaryTable').innerHTML = '';
                return;
            }

            let html = `<h3 style="border-bottom:1px solid #ccc; padding-bottom:10px;">
                            ${selectedDate} 汇总 (${receipts.length} 笔)
                        </h3>`;

            receipts.forEach((item) => {
                const d = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // 格式化手机号
                const phone = d.phoneNumber ? d.phoneNumber.replace(/(\d{2})(\d{4})(\d{4})/, '$1 $2 $3') : 'N/A';
                const totalAmount = d.total ? parseFloat(d.total).toFixed(2) : "0.00";
                const payMethod = "Cash"; // 默认支付方式

                // ✅ 核心排版：严格按照你的要求
                html += `
                    <div class="receipt-item">
                        <!-- 第一行：收据编号 | 名字   手机号 | 支付信息 -->
                        <div class="row-main">
                            <div>
                                收据编号: <strong>${d.receiptNumber || 'N/A'}</strong> | 
                                阳上报恩: <strong>${d.mainName || '匿名'}</strong>
                            </div>
                            <div style="text-align: right;">
                                手机号: <strong>${phone}</strong> | 
                                ${payMethod} - RM ${totalAmount} • ${time}
                            </div>
                        </div>

                        <!-- 第二行：法会类型 + 贡品明细 -->
                        <div class="row-details">
                            法会: ${d.dharmaType || 'N/A'} | 
                            ${d.itemsDetail || '无具体贡品'}
                        </div>
                    </div>
                `;
            });

            const summaryHtml = generateSummaryTable(receipts);
            document.getElementById('receiptList').innerHTML = html;
            document.getElementById('summaryTable').innerHTML = summaryHtml;
            document.getElementById('datePicker').value = selectedDate;
        }

        // --- 智能汇总表生成器 ---
        function generateSummaryTable(receipts) {
            let stats = {
                count: 0,
                totalAmount: 0,
                dharmaCount: {},
                itemDetails: {}
            };

            receipts.forEach(item => {
                const d = item.receiptData;
                stats.count++;
                const amount = parseFloat(d.total) || 0;
                stats.totalAmount += amount;

                // 统计法会
                if (d.dharmaType) {
                    stats.dharmaCount[d.dharmaType] = (stats.dharmaCount[d.dharmaType] || 0) + 1;
                }

                // 统计具体贡品 (如果有的话)
                if (d.itemsDetail) {
                    // 这里简单处理，实际可能需要更复杂的解析
                    // 假设 itemsDetail 是字符串，直接统计出现次数或者忽略，这里主要统计金额
                }
            });

            let html = `<table class="summary-table">
                            <thead>
                                <tr><th>项目</th><th>数量/备注</th><th>总金额 (RM)</th></tr>
                            </thead>
                            <tbody>`;

            // 显示法会统计
            for (const [type, count] of Object.entries(stats.dharmaCount)) {
                if (count > 0) {
                    html += `<tr><td>${type}</td><td>${count} 位</td><td>-</td></tr>`;
                }
            }

            // 总计行
            html += `<tr class="total-row">
                        <td>总计</td>
                        <td>${stats.count} 笔</td>
                        <td class="total-cell">${stats.totalAmount.toFixed(2)}</td>
                     </tr>`;

            html += `</tbody></table>`;
            return html;
        }

        // --- 其他功能 ---
        function printSummary() { window.print(); }

        function clearCache() {
            if (confirm('确定要清空今日缓存数据吗？')) {
                const selectedDate = document.getElementById('datePicker').value;
                clearDailyCache(selectedDate);
                loadDailyReceipts();
            }
        }

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('datePicker').value = today;
            loadDailyReceipts();
        };
    </script>
</body>
</html>
