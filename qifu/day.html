<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈福日汇总报表</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; font-size: 14px; }
        .header { text-align: center; margin-bottom: 20px; }
        .controls { margin-bottom: 20px; text-align: center; }
        .receipt-item { border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; page-break-inside: avoid; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .summary-table th, .summary-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .summary-table th { background-color: #f0f0f0; }
        .total-row { font-weight: bold; background-color: #e0e0e0; }
        @media print {
            body { margin: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>祈福日汇总报表</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <button onclick="loadDailyReceipts()">加载收据</button>
            <button onclick="printSummary()">打印汇总</button>
            <button onclick="clearCache()">清空缓存</button>
            <button onclick="exportToExcel()">导出Excel</button>
        </div>
    </div>

    <!-- 收据列表区域（已移除祈福详情显示） -->
    <div id="receiptList"></div>
    
    <!-- 汇总表格区域 -->
    <div id="summaryTable"></div>

    <script>
        // --- 通用工具函数 ---
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            const systemId = urlParams.get('system_id');
            if (systemId && systemId.trim()) {
                return systemId.trim();
            }
            return 'system_1';
        }

        function getDailyCachedReceipts(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            // ✅ 修复：使用 '[]' 字符串作为默认值，防止 JSON.parse 报错
            return JSON.parse(localStorage.getItem(cacheKey) || '[]');
        }

        function clearDailyCache(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            localStorage.removeItem(cacheKey);
            console.log(`已清空 ${today} 的缓存数据`);
        }

        // --- 主逻辑 ---
        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
            const receipts = getDailyCachedReceipts(selectedDate);

            if (receipts.length === 0) {
                document.getElementById('receiptList').innerHTML = '<p>该日期没有收据记录</p>';
                document.getElementById('summaryTable').innerHTML = '';
                return;
            }

            // 1. 生成收据列表（仅显示基本信息，去掉了祈福详情）
            let html = `<h2>${selectedDate} 日收据汇总 (${receipts.length} 张)</h2>`;
            let totalAmount = 0;

            receipts.forEach((item, index) => {
                const receiptData = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString();
                
                html += `
                    <div class="receipt-item">
                        <h4>收据 #${index + 1} - ${time}</h4>
                        <p><strong>收据号:</strong> ${receiptData.receiptNumber || 'N/A'}</p>
                        <p><strong>主祈者:</strong> ${receiptData.mainName || 'N/A'}</p>
                        <p><strong>电话:</strong> ${receiptData.phoneNumber || 'N/A'}</p>
                        <p><strong>法会类型:</strong> ${receiptData.dharmaType || 'N/A'}</p>
                        <p><strong>随喜赞助:</strong> RM ${(receiptData.sponsorAmount || 0).toFixed(2)}</p>
                        <p><strong>总金额:</strong> RM ${receiptData.total || '0.00'}</p>
                    </div>
                `;
                totalAmount += parseFloat(receiptData.total || 0);
            });

            // 2. 生成汇总表（智能显示）
            const summaryHtml = generateSummaryTable(receipts);
            
            document.getElementById('receiptList').innerHTML = html;
            document.getElementById('summaryTable').innerHTML = summaryHtml;
            document.getElementById('datePicker').value = selectedDate;
        }

        // --- 智能汇总表生成器 ---
        function generateSummaryTable(receipts) {
            // 初始化统计变量
            let stats = {
                token: { count: 0, price: 5, name: "祈福令牌" },
                fire: { count: 0, price: 1, name: "小护摩片" },
                pg3: { count: 0, price: 3, name: "纸金 3" },
                pg6: { count: 0, price: 6, name: "纸金 6" },
                donation: { count: 0, price: 0, name: "随喜赞助" } // 赞助单独处理
            };

            let totalAmount = 0;
            let receiptCount = 0;

            // 遍历数据累加
            receipts.forEach(item => {
                const data = item.receiptData;
                if (data.data && Array.isArray(data.data)) {
                    data.data.forEach(p => {
                        stats.token.count += +p.token || 0;
                        stats.fire.count += +p.fire || 0;
                        stats.pg3.count += +p.pg3 || 0;
                        stats.pg6.count += +p.pg6 || 0;
                    });
                }
                stats.donation.count += +data.sponsorAmount || 0;
                totalAmount += parseFloat(data.total || 0);
                receiptCount++;
            });

            // 动态构建表格行
            let rows = '';

            // 只有数量 > 0 才显示行
            if (stats.token.count > 0) {
                rows += `<tr><td>${stats.token.name}</td><td>${stats.token.count}</td><td>${stats.token.price}</td><td>${(stats.token.count * stats.token.price).toFixed(2)}</td></tr>`;
            }
            if (stats.fire.count > 0) {
                rows += `<tr><td>${stats.fire.name}</td><td>${stats.fire.count}</td><td>${stats.fire.price}</td><td>${(stats.fire.count * stats.fire.price).toFixed(2)}</td></tr>`;
            }
            if (stats.pg3.count > 0) {
                rows += `<tr><td>${stats.pg3.name}</td><td>${stats.pg3.count}</td><td>${stats.pg3.price}</td><td>${(stats.pg3.count * stats.pg3.price).toFixed(2)}</td></tr>`;
            }
            if (stats.pg6.count > 0) {
                rows += `<tr><td>${stats.pg6.name}</td><td>${stats.pg6.count}</td><td>${stats.pg6.price}</td><td>${(stats.pg6.count * stats.pg6.price).toFixed(2)}</td></tr>`;
            }
            
            // 随喜赞助通常总是显示，除非你希望金额为0时也隐藏，可以加判断 stats.donation.count > 0
            rows += `<tr><td>${stats.donation.name}</td><td>-</td><td>-</td><td>${stats.donation.count.toFixed(2)}</td></tr>`;

            // 收据张数统计
            rows += `<tr><td>收据张数</td><td>${receiptCount}</td><td>-</td><td>-</td></tr>`;

            // 总计行
            rows += `<tr class="total-row"><td colspan="3">总收入</td><td>${totalAmount.toFixed(2)}</td></tr>`;

            return `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>统计项目</th>
                            <th>数量</th>
                            <th>单价</th>
                            <th>金额 (RM)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        // --- 其他功能 ---
        function printSummary() {
            window.print();
        }

        function clearCache() {
            if (confirm('确定要清空今日缓存数据吗？此操作不可恢复！')) {
                const selectedDate = document.getElementById('datePicker').value || new Date().toISOString().split('T')[0];
                clearDailyCache(selectedDate);
                alert('缓存已清空！');
                loadDailyReceipts(); // 刷新视图
            }
        }

        function exportToExcel() {
            alert('Excel导出功能待实现');
        }

        // 页面加载时设置默认日期
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('datePicker').value = today;
            loadDailyReceipts(); // 自动加载当天数据
        };
    </script>
</body>
</html>
