<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>每日汇总 - 超度法会</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px;
        }

        /* === 界面控件（屏幕可见，打印隐藏）=== */
        .controls {
            text-align: center;
            margin-bottom: 12px;
            padding: 6px;
            background: #f0f4f8;
            border-radius: 4px;
        }
        .controls input, .controls button {
            padding: 5px 8px;
            font-size: 12px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .btn {
            background: #007bff; color: white; border: none; cursor: pointer;
        }
        .btn-print { background: #28a745; }
        .btn-refresh { background: #6c757d; }
        .btn-clear { background: #dc3545; }

        /* === 打印核心区域 === */
        .print-area {
            font-size: 11pt;
            line-height: 1.15;
            margin-top: 8px;
        }

        .receipt-item {
            padding: 2px 0;
            border-bottom: 1px dashed #ddd;
            page-break-inside: avoid;
        }
        .receipt-item:last-child {
            border-bottom: none;
        }

        /* 收据主行：改为 flex + 固定宽度布局，右侧紧凑 */
        .receipt-header {
            display: flex;
            align-items: baseline;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .receipt-left {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .receipt-right {
            flex: 0 0 auto; /* 不伸缩，内容多宽就多宽 */
            white-space: nowrap;
        }

        /* 字体统一加粗 + 更大 */
        .receipt-no, .receipt-meta {
            font-size: 12pt;
            font-weight: bold;
        }

        /* 明细行：单行大字、无分栏 */
        .receipt-detail {
            font-size: 10.5pt;
            color: #333;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: bold; /* 全部加粗 */
        }

        /* 物品列表：统一用「｜」分隔 */
        .items-line {
            display: inline;
        }
        .items-line span {
            margin: 0 0.08em; /* 更紧凑间距 */
        }

        /* 打印样式 */
        @media print {
            body { background: white; padding: 0; }
            .controls { display: none !important; }
            .container { padding: 0; margin: 0; }
            .print-area {
                font-size: 10pt;
                line-height: 1.1;
            }
            .receipt-header { font-size: 11pt; }
            .receipt-detail { font-size: 9.5pt; }
            .receipt-no, .receipt-meta { font-size: 11pt; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 屏幕控件（打印时隐藏） -->
        <div class="controls">
            <label>日期：</label>
            <input type="date" id="dateInput" value="2026-04-22">
            <button class="btn btn-refresh" onclick="loadDailySummary()">刷新</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ 打印当前页</button>
            <button class="btn btn-clear" onclick="clearCache()">清理缓存</button>
        </div>

        <!-- 打印区域 -->
        <div class="print-area" id="summaryContainer">
            <h2 style="text-align:center; margin:4px 0; font-size:13pt;">每日汇总 - 超度法会</h2>
            
            <!-- 汇总摘要 -->
            <div style="background:#f0f7ff; padding:4px 6px; margin:4px 0; font-size:11pt; font-weight:bold;">
                总计：RM <span id="totalAmount">0.00</span> ｜ 共 <span id="receiptCount">0</span> 笔 ｜ <span id="dateDisplay">2026-04-22</span>
            </div>

            <!-- 收据列表 -->
            <div id="receiptList">
                <div style="text-align:center; padding:16px; color:#666; font-size:10.5pt;">点击刷新加载数据</div>
            </div>
        </div>
    </div>

    <script>
        function loadDailySummary() {
            const date = document.getElementById('dateInput').value;
            document.getElementById('dateDisplay').textContent = date;
            
            // 构建缓存键
            const cacheKey = `daily_receipts_${date}_festival_system`;
            
            try {
                const cachedData = localStorage.getItem(cacheKey);
                
                if (cachedData) {
                    const receipts = JSON.parse(cachedData);
                    renderSummary(receipts, date);
                } else {
                    // 尝试查找最近日期
                    const allKeys = Object.keys(localStorage);
                    const dailyKeys = allKeys.filter(key => key.startsWith('daily_receipts_'));
                    
                    if (dailyKeys.length > 0) {
                        const recentDate = dailyKeys.reduce((latest, key) => {
                            const dateStr = key.split('_')[2];
                            return dateStr > latest ? dateStr : latest;
                        }, '0000-00-00');
                        
                        document.getElementById('dateInput').value = recentDate;
                        document.getElementById('dateDisplay').textContent = recentDate;
                        
                        const recentCachedData = localStorage.getItem(`daily_receipts_${recentDate}_festival_system`);
                        if (recentCachedData) {
                            const receipts = JSON.parse(recentCachedData);
                            renderSummary(receipts, recentDate);
                        } else {
                            showNoData();
                        }
                    } else {
                        showNoData();
                    }
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败: ' + error.message);
                showNoData();
            }
        }

        function renderSummary(receipts, date) {
            if (!receipts || receipts.length === 0) {
                showNoData();
                return;
            }

            let totalAmount = 0;
            receipts.forEach(r => {
                totalAmount += parseFloat(r.receiptData.total || 0);
            });

            document.getElementById('totalAmount').textContent = totalAmount.toFixed(2);
            document.getElementById('receiptCount').textContent = receipts.length;

            let html = '';
            receipts.forEach(receipt => {
                const d = receipt.receiptData;
                
                // 统计各物品总数
                let token = 0, boat = 0, lotus = 0, paper3 = 0, paper6 = 0, paper27 = 0;
                ["ancestor","baby","enemy","past","ground"].forEach(group => {
                    (d[group] || []).forEach(item => {
                        token += parseFloat(item.token) || 0;
                        boat += parseFloat(item.boat) || 0;
                        lotus += parseFloat(item.lotus) || 0;
                        paper3 += parseFloat(item.paper3) || 0;
                        paper6 += parseFloat(item.paper6) || 0;
                        paper27 += parseFloat(item.paper27) || 0;
                    });
                });

                // 过滤0值物品（仅显示非0项）
                const items = [
                    `法会：${d.festival || '中元节'}`,
                    ...(token > 0 ? [`令牌×${token}`] : []),
                    ...(boat > 0 ? [`法船×${boat}`] : []),
                    ...(lotus > 0 ? [`莲花×${lotus}`] : []),
                    ...(paper3 > 0 ? [`纸金3×${paper3}`] : []),
                    ...(paper6 > 0 ? [`纸金6×${paper6}`] : []),
                    ...(paper27 > 0 ? [`纸金27×${paper27}`] : []),
                    ...(parseFloat(d.donation || 0) > 0 ? [`供养金 RM ${parseFloat(d.donation).toFixed(2)}`] : [])
                ].join('｜');

                // 构建右侧紧凑信息：手机号｜支付方式
                const rightInfo = [
                    `手机号：${d.phone || '未填写'}`,
                    `${d.paymentMethod || 'Cash'} - RM ${d.total || '0.00'} · ${new Date(receipt.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`
                ].join('｜');

                html += `
                    <div class="receipt-item">
                        <div class="receipt-header">
                            <div class="receipt-left">
                                <span class="receipt-no">收据编号：${d.receiptNo || 'N/A'}｜阳上报恩人：${d.name || '未填写'}</span>
                            </div>
                            <div class="receipt-right">
                                <span class="receipt-meta">${rightInfo}</span>
                            </div>
                        </div>
                        <div class="receipt-detail">
                            <span class="items-line">${items}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('receiptList').innerHTML = html;
        }

        function showNoData() {
            document.getElementById('totalAmount').textContent = '0.00';
            document.getElementById('receiptCount').textContent = '0';
            document.getElementById('receiptList').innerHTML = 
                '<div style="text-align:center; padding:16px; color:#666; font-size:10.5pt;">该日期无数据，请刷新或检查缓存</div>';
        }

        function clearCache() {
            if (confirm('确定要清理所有缓存数据吗？')) {
                localStorage.clear();
                showNoData();
                alert('缓存已清理');
            }
        }

        window.onload = loadDailySummary;
    </script>
</body>
</html>
