<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超度日汇总报表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            font-size: 14px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
            text-align: center;
        }
        .receipt-item {
            border: 1px solid #ccc;
            margin-bottom: 10px;
            padding: 10px;
            page-break-inside: avoid;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        .summary-table th {
            background-color: #f0f0f0;
        }
        .total-row {
            font-weight: bold;
        }
        .payment-breakdown {
            margin-top: 20px;
        }
        .payment-breakdown table {
            width: 100%;
            border-collapse: collapse;
        }
        .payment-breakdown th, .payment-breakdown td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        .payment-breakdown th {
            background-color: #f0f0f0;
        }
        .debug-info {
            background-color: #e0f7fa;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00bcd4;
        }
        @media print {
            body {
                margin: 0;
            }
            .no-print, .debug-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>超度日汇总报表</h1>
        <div class="controls no-print">
            <label>选择日期: <input type="date" id="datePicker"></label>
            <label>付款方式: 
                <select id="paymentFilter">
                    <option value="">全部</option>
                    <option value="Cash">现金</option>
                    <option value="Transfer">转账</option>
                </select>
            </label>
            <button onclick="loadDailyReceipts()">加载收据</button>
            <button onclick="printSummary()">打印汇总</button>
            <button onclick="clearCache()">清空缓存</button>
            <button onclick="exportToExcel()">导出Excel</button>
        </div>
    </div>
    
    <div class="debug-info no-print">
        <strong>调试信息:</strong><br>
        <span id="debugOutput">点击"加载收据"查看调试信息</span>
    </div>
    
    <div id="receiptList"></div>
    <div id="summaryTable"></div>
    <div id="paymentBreakdown"></div>

    <script>
        function getCurrentSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            const systemId = urlParams.get('system_id');
            if (systemId && systemId.trim()) {
                return systemId.trim();
            }
            return 'system_1';
        }

        function getDailyCachedReceipts(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            
            // 尝试使用相同的缓存键格式
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            const receipts = JSON.parse(localStorage.getItem(cacheKey) || []);
            
            console.log(`查找缓存键: ${cacheKey}`);
            console.log(`找到收据数量: ${receipts.length}`);
            console.log(`缓存内容:`, receipts);
            
            return {
                receipts: receipts,
                cacheKey: cacheKey,
                date: today,
                systemId: SYSTEM_ID
            };
        }

        function clearDailyCache(date = null) {
            const SYSTEM_ID = getCurrentSystemId();
            const today = date || new Date().toISOString().split('T')[0];
            
            const cacheKey = `daily_receipts_${today}_${SYSTEM_ID}`;
            localStorage.removeItem(cacheKey);
            console.log(`已清空 ${today} 的缓存数据`);
        }

        function loadDailyReceipts() {
            const selectedDate = document.getElementById('datePicker').value || 
                               new Date().toISOString().split('T')[0];
            const paymentFilter = document.getElementById('paymentFilter').value;
            
            const result = getDailyCachedReceipts(selectedDate);
            const receipts = result.receipts;
            
            console.log(`从缓存获取的数据:`, receipts);
            
            // 更新调试信息
            document.getElementById('debugOutput').innerHTML = `
                日期: ${result.date}<br>
                系统ID: ${result.systemId}<br>
                缓存键: ${result.cacheKey}<br>
                找到收据数量: ${receipts.length}<br>
                过滤条件: ${paymentFilter || '无'}<br>
                缓存键是否存在: ${localStorage.getItem(result.cacheKey) ? '是' : '否'}<br>
                所有localStorage键: ${Object.keys(localStorage).join(', ')}
            `;
            
            // 根据付款方式筛选收据
            let filteredReceipts = receipts;
            if (paymentFilter) {
                filteredReceipts = receipts.filter(item => 
                    (item.receiptData.paymentMethod || 'Cash').toLowerCase() === paymentFilter.toLowerCase()
                );
            }
            
            if (filteredReceipts.length === 0) {
                document.getElementById('receiptList').innerHTML = '<p>该日期没有符合条件的收据记录</p>';
                document.getElementById('summaryTable').innerHTML = '';
                document.getElementById('paymentBreakdown').innerHTML = '';
                return;
            }

            let html = `<h2>${selectedDate} 日收据汇总 (${filteredReceipts.length} 张) - ${paymentFilter ? paymentFilter : '全部'}</h2>`;
            
            let totalAmount = 0;
            filteredReceipts.forEach((item, index) => {
                const receiptData = item.receiptData;
                const time = new Date(item.timestamp).toLocaleTimeString();
                
                html += `
                    <div class="receipt-item">
                        <h4>收据 #${index + 1} - ${time}</h4>
                        <p><strong>收据号:</strong> ${receiptData.receiptNo || 'N/A'}</p>
                        <p><strong>付款方式:</strong> ${receiptData.paymentMethod || 'Cash'}</p>
                        <p><strong>主祈者:</strong> ${receiptData.name || 'N/A'}</p>
                        <p><strong>电话:</strong> ${receiptData.phone || 'N/A'}</p>
                        <p><strong>法会类型:</strong> ${receiptData.festival || 'N/A'}</p>
                        <p><strong>报名供养金:</strong> RM ${(receiptData.donation || 0).toFixed(2)}</p>
                        <p><strong>总金额:</strong> RM ${receiptData.total || '0.00'}</p>
                        
                        <!-- 超度详情 -->
                        ${renderFestivalDetails(receiptData)}
                    </div>
                `;
                
                totalAmount += parseFloat(receiptData.total || 0);
            });

            // 生成汇总表（基于筛选后的收据）
            const summaryHtml = generateSummaryTable(filteredReceipts);
            
            // 生成付款方式分类表（基于原始收据）
            const paymentBreakdownHtml = generatePaymentBreakdown(receipts);

            document.getElementById('receiptList').innerHTML = html;
            document.getElementById('summaryTable').innerHTML = summaryHtml;
            document.getElementById('paymentBreakdown').innerHTML = paymentBreakdownHtml;

            // 更新日期选择器
            document.getElementById('datePicker').value = selectedDate;
        }

        function renderFestivalDetails(receiptData) {
            const priceMap = { token: 5, boat: 30, lotus: 6, paper3: 3, paper6: 6, paper27: 27 };
            const nameMap = { 
                token: "超度令牌", 
                boat: "法船配套", 
                lotus: "莲花", 
                paper3: "纸金 3", 
                paper6: "纸金 6", 
                paper27: "纸金 27" 
            };

            let detailsHTML = '<div><strong>超度项目:</strong><br>';
            let hasItems = false;

            ["ancestor", "baby", "enemy", "past", "ground"].forEach(group => {
                if (receiptData[group] && Array.isArray(receiptData[group])) {
                    receiptData[group].forEach(item => {
                        Object.entries(item).forEach(([key, value]) => {
                            if (value && value != '0' && priceMap[key]) {
                                const quantity = parseFloat(value);
                                if (!isNaN(quantity) && quantity > 0) {
                                    detailsHTML += `<p>&nbsp;&nbsp;${nameMap[key]}: ${quantity} ${getUnit(key)} (RM ${(quantity * priceMap[key]).toFixed(2)})</p>`;
                                    hasItems = true;
                                }
                            }
                        });
                    });
                }
            });
            
            if (!hasItems) {
                detailsHTML += '<p>&nbsp;&nbsp;无额外项目</p>';
            }
            
            detailsHTML += '</div>';
            return detailsHTML;
        }

        function getUnit(key) {
            switch(key) {
                case 'lotus': return '朵';
                case 'boat': return '套';
                case 'paper3': case 'paper6': case 'paper27': return '份';
                default: return '个';
            }
        }

        function generateSummaryTable(receipts) {
            // 统计各项数量和金额
            let token = 0, boat = 0, lotus = 0, paper3 = 0, paper6 = 0, paper27 = 0;
            let donationTotal = 0;
            let totalAmount = 0;
            let receiptCount = 0;

            receipts.forEach(item => {
                const data = item.receiptData;
                
                // 统计各项物品数量
                ["ancestor", "baby", "enemy", "past", "ground"].forEach(group => {
                    if (data[group] && Array.isArray(data[group])) {
                        data[group].forEach(item => {
                            Object.entries(item).forEach(([key, value]) => {
                                const quantity = parseFloat(value);
                                if (!isNaN(quantity) && quantity > 0) {
                                    switch(key) {
                                        case 'token': token += quantity; break;
                                        case 'boat': boat += quantity; break;
                                        case 'lotus': lotus += quantity; break;
                                        case 'paper3': paper3 += quantity; break;
                                        case 'paper6': paper6 += quantity; break;
                                        case 'paper27': paper27 += quantity; break;
                                    }
                                }
                            });
                        });
                    }
                });
                
                // 统计报名费
                donationTotal += parseFloat(data.donation || 0);
                totalAmount += parseFloat(data.total || 0);
                receiptCount++;
            });

            const tokenAmt = token * 5;
            const boatAmt = boat * 30;
            const lotusAmt = lotus * 6;
            const paper3Amt = paper3 * 3;
            const paper6Amt = paper6 * 6;
            const paper27Amt = paper27 * 27;

            return `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>统计项目</th>
                            <th>数量</th>
                            <th>单价</th>
                            <th>金额 (RM)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>超度令牌</td>
                            <td>${token}</td>
                            <td>5</td>
                            <td>${tokenAmt.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>法船配套</td>
                            <td>${boat}</td>
                            <td>30</td>
                            <td>${boatAmt.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>莲花</td>
                            <td>${lotus}</td>
                            <td>6</td>
                            <td>${lotusAmt.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>纸金 3</td>
                            <td>${paper3}</td>
                            <td>3</td>
                            <td>${paper3Amt.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>纸金 6</td>
                            <td>${paper6}</td>
                            <td>6</td>
                            <td>${paper6Amt.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>纸金 27</td>
                            <td>${paper27}</td>
                            <td>27</td>
                            <td>${paper27Amt.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>报名供养金</td>
                            <td>-</td>
                            <td>-</td>
                            <td>${donationTotal.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>收据张数</td>
                            <td>${receiptCount}</td>
                            <td>-</td>
                            <td>-</td>
                        </tr>
                        <tr class="total-row">
                            <td colspan="3">总收入</td>
                            <td>${totalAmount.toFixed(2)}</td>
                        </tr>
                    </tbody>
                </table>
            `;
        }

        function generatePaymentBreakdown(receipts) {
            const paymentBreakdown = {};
            
            receipts.forEach(item => {
                const paymentMethod = item.receiptData.paymentMethod || 'Cash';
                const amount = parseFloat(item.receiptData.total || 0);
                
                if (!paymentBreakdown[paymentMethod]) {
                    paymentBreakdown[paymentMethod] = 0;
                }
                paymentBreakdown[paymentMethod] += amount;
            });

            if (Object.keys(paymentBreakdown).length === 0) {
                return '';
            }

            let rows = '';
            let totalAmount = 0;
            for (const [method, amount] of Object.entries(paymentBreakdown)) {
                rows += `
                    <tr>
                        <td>${method}</td>
                        <td>RM ${amount.toFixed(2)}</td>
                    </tr>
                `;
                totalAmount += amount;
            }

            return `
                <div class="payment-breakdown">
                    <h3>付款方式分类</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>付款方式</th>
                                <th>金额</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                            <tr class="total-row">
                                <td><strong>总计</strong></td>
                                <td><strong>RM ${totalAmount.toFixed(2)}</strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
        }

        function printSummary() {
            window.print();
        }

        function clearCache() {
            if (confirm('确定要清空今日缓存数据吗？此操作不可恢复！')) {
                const selectedDate = document.getElementById('datePicker').value || 
                                   new Date().toISOString().split('T')[0];
                clearDailyCache(selectedDate);
                alert('缓存已清空！');
            }
        }

        function exportToExcel() {
            alert('Excel导出功能待实现');
        }

        // 页面加载时设置默认日期
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('datePicker').value = today;
            
            // 尝试加载今天的收据
            console.log('页面加载完成，等待点击加载按钮...');
        };
    </script>
</body>
</html>
