<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缓存测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .cache-entry {
            border: 1px solid #ccc;
            margin: 10px 0;
            padding: 10px;
            background-color: #f9f9f9;
        }
        button {
            margin: 5px;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>缓存测试页面</h1>
        <p>这个页面用来查看和管理缓存数据</p>
        
        <div>
            <button onclick="refreshCache()">刷新缓存列表</button>
            <button onclick="clearAllCache()">清空所有缓存</button>
            <button onclick="showSystemId()">显示系统ID</button>
        </div>
        
        <h2>缓存键列表</h2>
        <div id="cacheKeys"></div>
        
        <h2>缓存内容</h2>
        <div id="cacheContent"></div>
    </div>

    <script>
        function refreshCache() {
            const cacheKeysDiv = document.getElementById('cacheKeys');
            const cacheContentDiv = document.getElementById('cacheContent');
            
            // 获取所有缓存键
            const allKeys = Object.keys(localStorage);
            const dailyReceiptsKeys = allKeys.filter(key => key.includes('daily_receipts'));
            
            let keysHtml = '<ul>';
            dailyReceiptsKeys.forEach(key => {
                keysHtml += `<li><button onclick="loadCacheContent('${key}')">${key}</button></li>`;
            });
            keysHtml += '</ul>';
            
            cacheKeysDiv.innerHTML = keysHtml;
            cacheContentDiv.innerHTML = dailyReceiptsKeys.length > 0 ? '<p>点击上方按钮查看缓存内容</p>' : '<p>没有找到任何缓存数据</p>';
        }

        function loadCacheContent(cacheKey) {
            const cacheContentDiv = document.getElementById('cacheContent');
            const cacheData = localStorage.getItem(cacheKey);
            
            if (cacheData) {
                try {
                    const parsedData = JSON.parse(cacheData);
                    
                    let contentHtml = `<h3>缓存内容 - ${cacheKey}</h3>`;
                    contentHtml += `<p>记录数量: ${parsedData.length}</p>`;
                    
                    parsedData.forEach((entry, index) => {
                        const receiptData = entry.receiptData;
                        const timestamp = new Date(entry.timestamp).toLocaleString();
                        
                        contentHtml += `
                            <div class="cache-entry">
                                <h4>记录 #${index + 1} - ${timestamp}</h4>
                                <p><strong>收据号:</strong> ${receiptData.receiptNo || 'N/A'}</p>
                                <p><strong>付款方式:</strong> ${receiptData.paymentMethod || 'N/A'}</p>
                                <p><strong>总金额:</strong> RM ${receiptData.total || '0.00'}</p>
                                <p><strong>主祈者:</strong> ${receiptData.name || 'N/A'}</p>
                                <p><strong>电话:</strong> ${receiptData.phone || 'N/A'}</p>
                                <p><strong>法会类型:</strong> ${receiptData.festival || 'N/A'}</p>
                                <details>
                                    <summary>查看完整数据</summary>
                                    <pre>${JSON.stringify(receiptData, null, 2)}</pre>
                                </details>
                            </div>
                        `;
                    });
                    
                    cacheContentDiv.innerHTML = contentHtml;
                } catch (e) {
                    cacheContentDiv.innerHTML = `<h3>缓存内容 - ${cacheKey}</h3><p>解析错误: ${e.message}</p><pre>${cacheData}</pre>`;
                }
            } else {
                cacheContentDiv.innerHTML = `<h3>缓存内容 - ${cacheKey}</h3><p>缓存不存在或为空</p>`;
            }
        }

        function clearAllCache() {
            if (confirm('确定要清空所有缓存数据吗？此操作不可恢复！')) {
                const allKeys = Object.keys(localStorage);
                const dailyReceiptsKeys = allKeys.filter(key => key.includes('daily_receipts'));
                
                dailyReceiptsKeys.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                alert(`已删除 ${dailyReceiptsKeys.length} 个缓存条目`);
                refreshCache();
            }
        }

        function showSystemId() {
            const urlParams = new URLSearchParams(window.location.search);
            const systemId = urlParams.get('system_id');
            alert(`当前页面的系统ID: ${systemId || '未设置'}\n\nURL: ${window.location.href}`);
        }

        // 页面加载时自动刷新
        window.onload = function() {
            refreshCache();
        };
    </script>
</body>
</html>
