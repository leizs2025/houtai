<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超度法会 - 紧凑小票打印</title>
    <style>
        /* 屏幕显示样式（仅用于预览） */
        @media screen {
            body {
                font-family: 'Microsoft YaHei', Arial, sans-serif;
                margin: 0;
                padding: 20px;
                background-color: #f8f9fa;
            }
            .container {
                max-width: 1000px;
                margin: 0 auto;
                background: white;
                padding: 15px;
                border-radius: 6px;
                box-shadow: 0 1px 5px rgba(0,0,0,0.1);
            }
            .controls {
                text-align: center;
                margin-bottom: 20px;
            }
            .controls input {
                padding: 6px 12px;
                border: 1px solid #ddd;
                border-radius: 4px;
                font-size: 14px;
            }
            .controls button {
                padding: 6px 12px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin: 0 5px;
                font-size: 14px;
            }
            .btn-print { background: #28a745; color: white; }
            .btn-refresh { background: #6c757d; color: white; }
        }

        /* 打印样式 - 关键！只保留小票 */
        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            .container, .controls, .page-header, .summary-footer {
                display: none !important;
            }
            .print-area {
                width: 210mm;
                min-height: 297mm;
                margin: 0 auto;
                padding: 5mm;
                box-sizing: border-box;
            }
            .receipt-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 3mm;
                width: 100%;
            }
            .receipt-card {
                width: 54mm; /* 精确控制为54mm，3列共162mm，留出边距 */
                border: 1px solid #000;
                padding: 2mm;
                font-size: 8.5pt;
                line-height: 1.1;
                box-sizing: border-box;
                page-break-inside: avoid;
            }
            .receipt-header {
                text-align: center;
                font-weight: bold;
                font-size: 9pt;
                margin-bottom: 2mm;
                border-bottom: 1px solid #000;
                padding-bottom: 1mm;
            }
            .receipt-info {
                margin-bottom: 2mm;
            }
            .receipt-info p {
                margin: 0.5mm 0;
                font-size: 8pt;
            }
            .items-list {
                margin-top: 1mm;
                font-size: 8pt;
            }
            .item-row {
                display: flex;
                justify-content: space-between;
                margin: 0.3mm 0;
            }
            .item-label {
                flex: 1;
                text-align: left;
            }
            .item-qty {
                flex: 0.5;
                text-align: center;
            }
            .item-price {
                flex: 0.5;
                text-align: right;
            }
            .total-row {
                font-weight: bold;
                border-top: 1px solid #000;
                margin-top: 1mm;
                padding-top: 1mm;
            }
            .total-label {
                flex: 1;
                text-align: left;
            }
            .total-amount {
                flex: 1;
                text-align: right;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>
    <!-- 屏幕预览区域 -->
    <div class="container">
        <div class="controls">
            <label for="dateInput">选择日期: </label>
            <input type="date" id="dateInput" onchange="loadDailySummary()">
            <button class="btn-refresh" onclick="loadDailySummary()">刷新</button>
            <button class="btn-print" onclick="window.print()">打印小票</button>
        </div>
        
        <div id="previewArea">
            <p style="text-align: center; color: #666;">选择日期后查看小票预览</p>
        </div>
    </div>

    <!-- 打印区域 - 只在打印时显示 -->
    <div class="print-area" id="printArea"></div>

    <script>
        let allReceipts = [];
        let SYSTEM_ID = 'festival_system';

        // 初始化日期选择器为今天
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = today;
            loadDailySummary();
        });

        function getCacheKey(date) {
            return `daily_receipts_${date}_${SYSTEM_ID}`;
        }

        function loadDailySummary() {
            const dateInput = document.getElementById('dateInput').value;
            const cacheKey = getCacheKey(dateInput);
            
            // 更新预览区域
            const previewArea = document.getElementById('previewArea');
            previewArea.innerHTML = '<p style="text-align: center; color: #666;">正在加载数据...</p>';
            
            try {
                const cachedData = localStorage.getItem(cacheKey);
                if (cachedData) {
                    const receipts = JSON.parse(cachedData);
                    allReceipts = receipts;
                    renderPreview(receipts);
                    renderPrintArea(receipts);
                } else {
                    previewArea.innerHTML = '<p style="text-align: center; color: #999;">该日期没有数据</p>';
                    document.getElementById('printArea').innerHTML = '';
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                previewArea.innerHTML = `<p style="text-align: center; color: #d32f2f;">加载失败: ${error.message}</p>`;
                document.getElementById('printArea').innerHTML = '';
            }
        }

        function renderPreview(receipts) {
            if (!receipts || receipts.length === 0) {
                document.getElementById('previewArea').innerHTML = '<p style="text-align: center; color: #999;">无数据</p>';
                return;
            }

            let html = `<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">`;
            receipts.slice(0, 6).forEach((receipt, i) => {
                html += `<div style="width: 80px; border: 1px solid #ccc; padding: 5px; font-size: 10px;">
                    <div style="font-weight: bold; text-align: center;">${receipt.receiptData.receiptNo || 'N/A'}</div>
                    <div>${receipt.receiptData.name || '未填'}</div>
                    <div>RM ${parseFloat(receipt.receiptData.total || 0).toFixed(2)}</div>
                </div>`;
            });
            html += '</div>';
            document.getElementById('previewArea').innerHTML = html;
        }

        function renderPrintArea(receipts) {
            if (!receipts || receipts.length === 0) {
                document.getElementById('printArea').innerHTML = '';
                return;
            }

            let html = `<div class="receipt-grid">`;
            
            receipts.forEach(receipt => {
                html += renderCompactReceiptCard(receipt.receiptData);
            });
            
            html += `</div>`;
            document.getElementById('printArea').innerHTML = html;
        }

        function renderCompactReceiptCard(data) {
            const currentYear = new Date().getFullYear();
            
            // 计算总金额和物品数量
            let total = parseFloat(data.donation || 0);
            const priceMap = { token: 5, boat: 30, lotus: 6, paper3: 3, paper6: 6, paper27: 27 };
            const nameMap = { token: "令牌", boat: "法船", lotus: "莲花", paper3: "纸金3", paper6: "纸金6", paper27: "纸金27" };
            const items = [];

            ["ancestor", "baby", "enemy", "past", "ground"].forEach(group => {
                (data[group] || []).forEach(item => {
                    Object.entries(item).forEach(([key, value]) => {
                        if (value && priceMap[key]) {
                            const quantity = parseFloat(value);
                            if (!isNaN(quantity)) {
                                const subtotal = quantity * priceMap[key];
                                items.push({
                                    name: nameMap[key],
                                    qty: quantity,
                                    price: subtotal
                                });
                                total += subtotal;
                            }
                        }
                    });
                });
            });

            // 构建小票HTML
            let card = `
                <div class="receipt-card">
                    <div class="receipt-header">
                        ${data.receiptNo || "N/A"}
                    </div>
                    
                    <div class="receipt-info">
                        <p><strong>${data.name || "未填写"}</strong></p>
                        <p>电: ${data.phone || ""}</p>
                        <p>付: ${data.paymentMethod || "Cash"}</p>
                        <p>法会: ${data.festival || ""}</p>
                    </div>
            `;

            // 添加物品列表
            if (items.length > 0) {
                card += `<div class="items-list">`;
                items.forEach(item => {
                    card += `
                        <div class="item-row">
                            <span class="item-label">${item.name}</span>
                            <span class="item-qty">${item.qty}</span>
                            <span class="item-price">RM ${item.price.toFixed(2)}</span>
                        </div>
                    `;
                });
                card += `</div>`;
            }

            // 添加供养金（如果存在）
            if (parseFloat(data.donation || 0) > 0) {
                card += `
                    <div class="item-row">
                        <span class="item-label">供养金</span>
                        <span class="item-qty"></span>
                        <span class="item-price">RM ${parseFloat(data.donation || 0).toFixed(2)}</span>
                    </div>
                `;
            }

            // 添加总计
            card += `
                <div class="item-row total-row">
                    <span class="total-label">总计</span>
                    <span class="total-amount">RM ${total.toFixed(2)}</span>
                </div>
            `;

            card += `</div>`;
            return card;
        }
    </script>
</body>
</html>
