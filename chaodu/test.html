<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>每日汇总 - 超度法会</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 16px;
            background: #fff;
            font-size: 11pt;
            line-height: 1.3;
        }
        .header {
            text-align: center;
            font-weight: bold;
            font-size: 13pt;
            margin-bottom: 8px;
        }
        .summary {
            background: #f0f7ff;
            padding: 4px 8px;
            margin: 6px 0;
            font-weight: bold;
            font-size: 11pt;
        }
        .receipt {
            margin: 4px 0;
            font-weight: bold;
            font-size: 12pt; /* 关键：所有文本统一加粗+大字号 */
        }
        .items {
            margin-top: 2px;
            font-weight: bold;
            font-size: 10.5pt;
            color: #000;
        }

        /* 打印样式 */
        @media print {
            body { padding: 0; margin: 0; }
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">每日汇总 - 超度法会</div>

    <!-- 汇总行 -->
    <div class="summary" id="summaryLine">
        总计：RM <span id="total">0.00</span> ｜ 共 <span id="count">0</span> 笔 ｜ <span id="date">2026-04-22</span>
    </div>

    <!-- 收据列表（纯文本，无任何 div 分隔） -->
    <div id="receiptList">
        <div class="receipt">收据编号：010514｜阳上报恩人：林忠辉　　　　　手机号：6m0198863232｜Cash - RM 214.00 · 09:50</div>
        <div class="items">法会：中元节｜令牌×16｜法船×1｜纸金3×18｜供养金 RM 50.00</div>
    </div>

    <!-- 控件（仅屏幕显示） -->
    <div style="text-align:center; margin-top:20px; font-size:10pt;">
        <button onclick="refresh()">🔄 刷新（读取缓存）</button>
        <button onclick="clearCache()" style="margin:0 8px; background:#dc3545;">🗑️ 清除缓存</button>
        <button onclick="print()">🖨️ 打印</button>
        <br><br>
        <input type="date" id="dt" value="2026-04-22" onchange="loadByDate()">
    </div>

    <script>
        // ===== 实用工具函数 =====
        function safeParse(str) {
            try { return JSON.parse(str); } catch { return null; }
        }

        function formatDate(d) {
            return d.toISOString().split('T')[0];
        }

        // ===== 清除缓存（强化版）=====
        function clearCache() {
            if (!confirm('⚠️ 确认清除所有本地缓存？\n（将删除所有收据数据）')) return;
            
            // 尝试多种方式清除
            localStorage.clear();
            sessionStorage.clear();
            
            // 强制刷新页面以确保新状态
            location.reload(true);
        }

        // ===== 加载指定日期数据 =====
        function loadByDate() {
            const date = document.getElementById('dt').value;
            document.getElementById('date').textContent = date;
            
            const key = `daily_receipts_${date}_festival_system`;
            const data = safeParse(localStorage.getItem(key));
            
            if (data && Array.isArray(data) && data.length > 0) {
                renderReceipts(data, date);
            } else {
                // 回退：找最近日期
                const keys = Object.keys(localStorage).filter(k => k.startsWith('daily_receipts_'));
                if (keys.length === 0) {
                    showPlaceholder();
                    return;
                }
                const latestKey = keys.reduce((a, b) => 
                    a.split('_')[2] > b.split('_')[2] ? a : b
                );
                const latestData = safeParse(localStorage.getItem(latestKey));
                if (latestData && Array.isArray(latestData)) {
                    const latestDate = latestKey.split('_')[2];
                    document.getElementById('date').textContent = latestDate;
                    document.getElementById('dt').value = latestDate;
                    renderReceipts(latestData, latestDate);
                } else {
                    showPlaceholder();
                }
            }
        }

        // ===== 渲染收据（严格按截图格式）=====
        function renderReceipts(receipts, date) {
            let total = 0;
            let html = '';

            receipts.forEach(r => {
                const d = r.receiptData;
                total += parseFloat(d.total || 0);

                // 物品统计（仅非0）
                let token=0, boat=0, lotus=0, p3=0, p6=0, p27=0;
                ["ancestor","baby","enemy","past","ground"].forEach(g=>{
                    (d[g]||[]).forEach(i=>{
                        token+=+i.token||0; boat+=+i.boat||0; lotus+=+i.lotus||0;
                        p3+=+i.paper3||0; p6+=+i.paper6||0; p27+=+i.paper27||0;
                    });
                });

                const items = [
                    `法会：${d.festival||'中元节'}`,
                    ...(token>0?[`令牌×${token}`]:[]),
                    ...(boat>0?[`法船×${boat}`]:[]),
                    ...(lotus>0?[`莲花×${lotus}`]:[]),
                    ...(p3>0?[`纸金3×${p3}`]:[]),
                    ...(p6>0?[`纸金6×${p6}`]:[]),
                    ...(p27>0?[`纸金27×${p27}`]:[]),
                    ...(d.donation>0?[`供养金 RM ${+d.donation}`]:[])
                ].join('｜');

                // ⚠️ 关键：用全角空格（　）控制间距，确保对齐！
                // 4个全角空格 ≈ 8个英文空格，视觉上与截图一致
                const receiptLine = 
                    `收据编号：${d.receiptNo||'N/A'}｜阳上报恩人：${d.name||'未填写'}　　　　　手机号：${d.phone||'未填写'}｜${d.paymentMethod||'Cash'} - RM ${d.total||'0.00'} · ${new Date(r.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;

                html += `<div class="receipt">${receiptLine}</div><div class="items">${items}</div>`;
            });

            document.getElementById('receiptList').innerHTML = html;
            document.getElementById('total').textContent = total.toFixed(2);
            document.getElementById('count').textContent = receipts.length;
        }

        function showPlaceholder() {
            document.getElementById('receiptList').innerHTML = `
                <div class="receipt">收据编号：010514｜阳上报恩人：林忠辉　　　　　手机号：6m0198863232｜Cash - RM 214.00 · 09:50</div>
                <div class="items">法会：中元节｜令牌×16｜法船×1｜纸金3×18｜供养金 RM 50.00</div>
            `;
            document.getElementById('total').textContent = '214.00';
            document.getElementById('count').textContent = '1';
            document.getElementById('date').textContent = '2026-04-22';
        }

        function refresh() {
            loadByDate();
        }

        function print() {
            window.print();
        }

        // 初始化
        window.onload = () => {
            // 首次加载默认日期
            loadByDate();
        };
    </script>
</body>
</html>
