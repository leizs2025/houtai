<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>每日汇总 - 超度法会</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px;
        }

        /* === 界面控件（屏幕可见，打印隐藏）=== */
        .controls {
            text-align: center;
            margin-bottom: 12px;
            padding: 6px;
            background: #f0f4f8;
            border-radius: 4px;
        }
        .controls input, .controls button {
            padding: 5px 8px;
            font-size: 12px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .btn {
            background: #007bff; color: white; border: none; cursor: pointer;
        }
        .btn-print { background: #28a745; }
        .btn-refresh { background: #6c757d; }
        .btn-clear { background: #dc3545; }

        /* === 打印核心区域 === */
        .print-area {
            font-size: 10.5pt;
            line-height: 1.1;
            margin-top: 8px;
        }

        .receipt-item {
            padding: 2px 0;
            border-bottom: 1px dashed #ddd;
            page-break-inside: avoid;
        }
        .receipt-item:last-child {
            border-bottom: none;
        }

        /* 收据主行：单行紧凑布局 */
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: bold;
            margin-bottom: 1px;
        }
        .receipt-no { font-size: 11pt; }
        .receipt-meta { font-size: 9.5pt; color: #555; }

        /* 明细行：超紧凑单行（关键改进！）*/
        .receipt-detail {
            font-size: 9.5pt;
            color: #444;
            margin-top: 1px;
        }
        .detail-left { display: inline-block; width: 65%; vertical-align: top; }
        .detail-right { display: inline-block; width: 34%; vertical-align: top; text-align: right; }

        /* 物品列表：用空格分隔，不换行 */
        .items-line {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 打印样式 */
        @media print {
            body { background: white; padding: 0; }
            .controls { display: none !important; }
            .container { padding: 0; margin: 0; }
            .print-area {
                font-size: 9pt;
                line-height: 1.05;
            }
            .receipt-item {
                padding: 1.5px 0;
                margin: 0;
            }
            .receipt-header { font-size: 10pt; }
            .receipt-detail { font-size: 8.5pt; }
            .items-line { font-size: 8.5pt; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 屏幕控件（打印时隐藏） -->
        <div class="controls">
            <label>日期：</label>
            <input type="date" id="dateInput" value="2026-04-21">
            <button class="btn btn-refresh" onclick="loadDailySummary()">刷新</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ 打印当前页</button>
            <button class="btn btn-clear" onclick="clearCache()">清理缓存</button>
        </div>

        <!-- 打印区域（紧凑版） -->
        <div class="print-area" id="summaryContainer">
            <h2 style="text-align:center; margin:4px 0; font-size:12pt;">每日汇总 - 超度法会</h2>
            
            <!-- 汇总摘要（极简） -->
            <div style="background:#f0f7ff; padding:4px 6px; margin:4px 0; font-size:10pt;">
                <strong>总计：</strong> RM <span id="totalAmount">0.00</span> &nbsp;｜&nbsp; 共 <span id="receiptCount">0</span> 笔 &nbsp;｜&nbsp; <span id="dateDisplay">2026-04-21</span>
            </div>

            <!-- 收据列表容器 -->
            <div id="receiptList"></div>
        </div>
    </div>

    <script>
        // 从缓存读取数据
        function loadDailySummary() {
            const date = document.getElementById('dateInput').value;
            document.getElementById('dateDisplay').textContent = date;
            
            // 构建缓存键
            const cacheKey = `daily_receipts_${date}_festival_system`;
            
            try {
                const cachedData = localStorage.getItem(cacheKey);
                
                if (cachedData) {
                    const receipts = JSON.parse(cachedData);
                    renderSummary(receipts, date);
                } else {
                    // 如果没有找到对应日期的数据，尝试查找其他日期
                    const allKeys = Object.keys(localStorage);
                    const dailyKeys = allKeys.filter(key => key.startsWith('daily_receipts_'));
                    
                    if (dailyKeys.length > 0) {
                        // 找到最近的日期
                        const recentDate = dailyKeys.reduce((latest, key) => {
                            const dateStr = key.split('_')[2];
                            return dateStr > latest ? dateStr : latest;
                        }, '0000-00-00');
                        
                        document.getElementById('dateInput').value = recentDate;
                        document.getElementById('dateDisplay').textContent = recentDate;
                        
                        const recentCachedData = localStorage.getItem(`daily_receipts_${recentDate}_festival_system`);
                        if (recentCachedData) {
                            const receipts = JSON.parse(recentCachedData);
                            renderSummary(receipts, recentDate);
                        } else {
                            showNoData();
                        }
                    } else {
                        showNoData();
                    }
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败: ' + error.message);
                showNoData();
            }
        }

        function renderSummary(receipts, date) {
            if (!receipts || receipts.length === 0) {
                showNoData();
                return;
            }

            // 计算汇总数据
            let totalAmount = 0;
            let receiptCount = receipts.length;

            receipts.forEach(receipt => {
                const data = receipt.receiptData;
                totalAmount += parseFloat(data.total || 0);
            });

            // 更新汇总信息
            document.getElementById('totalAmount').textContent = totalAmount.toFixed(2);
            document.getElementById('receiptCount').textContent = receiptCount;

            // 生成收据列表
            let receiptHTML = '';
            receipts.forEach(receipt => {
                const data = receipt.receiptData;
                
                // 解析时间戳
                const timestamp = new Date(receipt.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                // 计算各类物品总数
                let tokenCount = 0, boatCount = 0, lotusCount = 0, paper3Count = 0, paper6Count = 0, paper27Count = 0;
                
                ["ancestor", "baby", "enemy", "past", "ground"].forEach(group => {
                    (data[group] || []).forEach(item => {
                        Object.entries(item).forEach(([key, value]) => {
                            const quantity = parseFloat(value);
                            if (!isNaN(quantity)) {
                                switch(key) {
                                    case 'token': tokenCount += quantity; break;
                                    case 'boat': boatCount += quantity; break;
                                    case 'lotus': lotusCount += quantity; break;
                                    case 'paper3': paper3Count += quantity; break;
                                    case 'paper6': paper6Count += quantity; break;
                                    case 'paper27': paper27Count += quantity; break;
                                }
                            }
                        });
                    });
                });
                
                // 构建物品详情
                const festival = data.festival || '中元节';
                const itemsLeft = `法会：${festival}｜令牌×${tokenCount}｜法船×${boatCount}｜莲花×${lotusCount}${data.donation && parseFloat(data.donation) > 0 ? `｜供养金 RM ${parseFloat(data.donation).toFixed(2)}` : ''}`;
                const itemsRight = `纸金3×${paper3Count}｜纸金6×${paper6Count}｜纸金27×${paper27Count}`;
                
                receiptHTML += `
                    <div class="receipt-item">
                        <div class="receipt-header">
                            <span class="receipt-no">${data.receiptNo || 'N/A'} - ${data.name || '未填写'}</span>
                            <span class="receipt-meta">${data.paymentMethod || 'Cash'} - RM ${data.total || '0.00'} · ${timestamp}</span>
                        </div>
                        <div class="receipt-detail">
                            <span class="detail-left">${itemsLeft}</span>
                            <span class="detail-right">${itemsRight}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('receiptList').innerHTML = receiptHTML;
        }

        function showNoData() {
            document.getElementById('totalAmount').textContent = '0.00';
            document.getElementById('receiptCount').textContent = '0';
            document.getElementById('receiptList').innerHTML = '<div style="text-align:center; padding:20px; color:#666;">该日期没有数据</div>';
        }

        function clearCache() {
            if (confirm('确定要清理所有缓存数据吗？')) {
                localStorage.clear();
                showNoData();
                alert('缓存已清理');
            }
        }

        // 页面加载时初始化
        window.onload = function() {
            loadDailySummary();
        };
    </script>
</body>
</html>
