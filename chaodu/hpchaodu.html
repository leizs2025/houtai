<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超度登记系统 (2026版)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- 引入 PDF 生成库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #fff8e7; padding-bottom: 50px; }
        .header-icon { font-size: 2.5rem; margin-bottom: 10px; }
        input[readonly] { background-color: #e9ecef; cursor: not-allowed; }
        
        /* PDF 隐藏区域 */
        #receiptArea { display: none; background: white; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. 头部 -->
        <div class="text-center py-4">
            <div class="header-icon">🪔</div>
            <h3>2026年 超度登记 / 老户补录</h3>
            <p class="text-muted">输入去年登记的手机号查询，系统将自动建立新档案</p>
        </div>

        <!-- 2. 查询区域 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="input-group">
                    <input type="tel" id="searchInput" class="form-control form-control-lg" placeholder="请输入去年登记的手机号">
                    <button onclick="searchPhone()" class="btn btn-primary px-4">🔍 查询/新建</button>
                </div>
                <div id="searchResults" class="mt-2 text-danger small"></div>
            </div>
        </div>

        <!-- 3. 登记表单 -->
        <div id="formContainer" style="display: none;">
            <div id="pdfContent" class="bg-white p-4 rounded shadow">
                <h4 class="text-center border-bottom pb-2 mb-4">📝 超度功德主登记表</h4>
                
                <!-- 阳上信息 -->
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">功德主姓名 (阳上)：</label>
                        <input id="mainName" class="form-control" placeholder="您的姓名">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">联络电话：</label>
                        <input id="phoneNumber" type="tel" class="form-control" placeholder="用于查询">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">地址：</label>
                        <input id="address" class="form-control" placeholder="居住地址">
                    </div>
                </div>

                <!-- 法会信息 -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">法会类别：</label>
                        <select id="festival" class="form-select">
                            <option value="">请选择法会</option>
                            <option value="清明节">清明节</option>
                            <option value="中元节">中元节</option>
                            <option value="不空羂索">不空羂索</option>
                            <option value="感恩护法">感恩护法</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">随喜供养 (RM)：</label>
                        <input id="donation" type="number" class="form-control" oninput="calculateTotal()">
                    </div>
                </div>

                <!-- 分组容器 -->
                <div id="groupsContainer"></div>
            </div>

            <!-- 底部操作栏 -->
            <div class="mt-4 text-center">
                <div id="totalAmountDisplay" class="mb-3 fs-5 fw-bold text-end text-primary"></div>
                <button id="btnSubmit" class="btn btn-success btn-lg px-5" onclick="submitUserData()">
                    📤 确认提交并生成回执
                </button>
            </div>
        </div>
    </div>

    <!-- 隐藏的 PDF 模板 -->
    <div id="receiptArea">
        <div class="text-center mb-4">
            <h3>超度登记回执</h3>
            <p>登记日期：<span id="pdfDate"></span></p>
        </div>
        <table class="table table-bordered">
            <tr><th>功德主</th><td id="pdfName"></td><th>法会</th><td id="pdfFestival"></td></tr>
            <tr><th>编号</th><td id="pdfCode"></td><th>总额</th><td id="pdfTotal"></td></tr>
        </table>
        <div id="pdfDetails"></div>
    </div>

    <script>
        // ================= 配置与映射 =================
        // 注意：这里的配置必须与后端数据库列的顺序严格对应
        const fieldsMap = {
            "group-ancestor": [
                { key: "ancestorName", label: "祖先/亡灵姓名", row: 0, col: 6 },
                { key: "token", label: "令牌", type: "number", row: 0, col: 2 },
                { key: "boat", label: "法船", type: "number", row: 0, col: 2 },
                { key: "lotus", label: "莲花", type: "number", row: 1, col: 2 },
                { key: "paper3", label: "纸金3", type: "number", row: 1, col: 2 },
                { key: "extra", label: "备注", row: 2, col: 6 }
            ],
            "group-baby": [
                { key: "yang", label: "阳上", row: 0, col: 6 },
                { key: "token", label: "令牌", type: "number", row: 0, col: 2 },
                { key: "boat", label: "法船", type: "number", row: 0, col: 2 },
                { key: "lotus", label: "莲花", type: "number", row: 1, col: 2 }
            ],
            "group-enemy": [
                { key: "yang", label: "阳上", row: 0, col: 6 },
                { key: "token", label: "令牌", type: "number", row: 0, col: 2 }
            ],
            "group-past": [
                { key: "yang", label: "阳上", row: 0, col: 6 },
                { key: "token", label: "令牌", type: "number", row: 0, col: 2 }
            ],
            "group-ground": [
                { key: "location", label: "地址", row: 0, col: 6 },
                { key: "token", label: "令牌", type: "number", row: 0, col: 2 }
            ]
        };

        const groupTitleMap = {
            'group-ancestor': '祖先 / 亡灵',
            'group-baby': '水子灵',
            'group-enemy': '冤亲债主',
            'group-past': '过往生灵',
            'group-ground': '地基主'
        };

        const groupLimitMap = { 'group-ancestor': 8, 'group-baby': 5, 'group-enemy': 5, 'group-past': 4, 'group-ground': 3 };

        // 定义每个分组在数据库行中的起始索引和长度
        // 你必须根据你实际的 Sheet 表结构调整这些数字
        const groupConfigs = {
            "group-ancestor": { start: 4, count: 8, fieldsLen: 6 }, // 假设从第5列开始，有8个人，每人6个字段
            "group-baby":    { start: 52, count: 5, fieldsLen: 4 },
            "group-enemy":   { start: 72, count: 5, fieldsLen: 2 },
            "group-past":    { start: 82, count: 4, fieldsLen: 2 },
            "group-ground":  { start: 90, count: 3, fieldsLen: 2 }
        };

        // ================= 核心逻辑函数 =================

        // 1. 初始化页面结构
        function initGroups() {
            const container = document.getElementById("groupsContainer");
            container.innerHTML = "";
            Object.entries(groupTitleMap).forEach(([groupId, title]) => {
                const groupDiv = document.createElement("div");
                groupDiv.className = "mb-3 p-3 border rounded bg-light";
                groupDiv.innerHTML = `<h6 class="fw-bold">${title}</h6>`;
                
                const contentDiv = document.createElement("div");
                contentDiv.id = groupId;
                groupDiv.appendChild(contentDiv);

                const btn = document.createElement("button");
                btn.className = "btn btn-sm btn-outline-primary mt-2";
                btn.innerText = `+ 添加 ${title}`;
                btn.onclick = () => {
                    if (contentDiv.children.length >= groupLimitMap[groupId]) return alert("已达上限");
                    contentDiv.appendChild(createFieldsBlock(fieldsMap[groupId], contentDiv.children.length, title));
                    calculateTotal();
                };
                groupDiv.appendChild(btn);
                container.appendChild(groupDiv);
            });
        }

        // 2. 创建字段块
        function createFieldsBlock(fields, index, title) {
            const card = document.createElement("div");
            card.className = "card p-2 mb-2 mt-2";
            card.innerHTML = `<div class="fw-bold small">第 ${index + 1} 位 <span class="text-danger float-end cursor-pointer" onclick="this.parentElement.parentElement.remove(); calculateTotal()">✕</span></div>`;
            
            const row = document.createElement("div");
            row.className = "row g-2";
            fields.forEach(f => {
                const col = document.createElement("div");
                col.className = `col-${f.col || 6}`;
                col.innerHTML = `<label class="small text-muted">${f.label}</label><input class="form-control form-control-sm" data-key="${f.key}" type="${f.type||'text'}" oninput="calculateTotal()"></input>`;
                row.appendChild(col);
            });
            card.appendChild(row);
            return card;
        }

        // 3. 计算总金额
        function calculateTotal() {
            const prices = { token: 5, boat: 30, lotus: 6, paper3: 3, paper6: 6, paper27: 27 };
            let total = parseFloat(document.getElementById("donation").value || 0);
            
            document.querySelectorAll("input[data-key]").forEach(input => {
                const key = input.dataset.key;
                if (prices[key]) total += (parseFloat(input.value || 0) * prices[key]);
            });

            document.getElementById("totalAmountDisplay").innerText = `总计: RM ${total.toFixed(2)}`;
            return total;
        }

        // 4. 【核心修复】查询功能
        function searchPhone() {
            const phone = document.getElementById("searchInput").value.trim();
            const resultDiv = document.getElementById("searchResults");
            
            if (!phone) return alert("请输入手机号");

            resultDiv.innerText = "正在查询...";
            resultDiv.className = "mt-2 text-primary small";

            // 真实请求后端
            fetch(`https://form.gealarm2012.workers.dev/admin-chaodu?search=${encodeURIComponent(phone)}`)
                .then(res => res.json())
                .then(results => {
                    if (results.length === 0) {
                        // 没找到记录，新建
                        resultDiv.innerText = "未找到旧记录，将创建新档案";
                        resultDiv.className = "mt-2 text-success small";
                        document.getElementById("formContainer").style.display = "block";
                        initGroups(); // 清空并重置表单
                        document.getElementById("phoneNumber").value = phone;
                        document.getElementById("mainName").removeAttribute("readonly");
                    } else {
                        // 找到记录，回填数据
                        resultDiv.innerText = "✅ 查询成功，已加载去年数据";
                        resultDiv.className = "mt-2 text-success small";
                        
                        document.getElementById("formContainer").style.display = "block";
                        loadEntry(results[0]); // 调用回填函数
                    }
                })
                .catch(err => {
                    console.error(err);
                    resultDiv.innerText = "查询失败，请检查网络";
                    resultDiv.className = "mt-2 text-danger small";
                });
        }

        // 5. 【核心修复】数据回填函数
        function loadEntry(row) {
            // 1. 填充基本信息 (根据后端返回的索引调整)
            // 假设 row[1]=姓名, row[2]=电话, row[3]=地址, row[231]=法会
            document.getElementById("mainName").value = row[1] || "";
            document.getElementById("phoneNumber").value = row[2] || "";
            document.getElementById("address").value = row[3] || "";
            document.getElementById("festival").value = row[231] || "";
            document.getElementById("donation").value = row[230] || 0;

            // 2. 锁定关键字段
            document.getElementById("mainName").setAttribute("readonly", true);
            document.getElementById("phoneNumber").setAttribute("readonly", true);

            // 3. 重置分组容器
            initGroups(); 

            // 4. 循环填充分组数据
            Object.entries(groupConfigs).forEach(([groupId, cfg]) => {
                const container = document.getElementById(groupId);
                const fields = fieldsMap[groupId];
                
                // 遍历该组允许的最大人数
                for (let i = 0; i < cfg.count; i++) {
                    // 计算当前这个人在数组中的起始位置
                    const personStartIndex = cfg.start + (i * cfg.fieldsLen);
                    
                    // 检查这个人是否有数据（只要第一个字段有值就算有）
                    // 注意：这里假设 fields[0].key 对应的值在 row 数组中存在
                    // 由于 row 是纯数组，我们需要知道 fields[0].key 对应 row 的哪个位置
                    // 这里为了简化，我们假设 row 数组也是按顺序排列的
                    
                    // 创建一个临时的 DOM 块来填充数据
                    const card = createFieldsBlock(fields, i, groupTitleMap[groupId]);
                    const inputs = card.querySelectorAll("input");
                    
                    let hasData = false;
                    inputs.forEach((input, idx) => {
                        // 获取 row 中对应的值
                        const val = row[personStartIndex + idx];
                        if (val) {
                            input.value = val;
                            hasData = true;
                        }
                    });

                    // 如果这个人有数据，就加到页面上
                    if (hasData) {
                        container.appendChild(card);
                    }
                }
            });

            // 5. 重新计算总价
            calculateTotal();
        }

        // 6. 生成前缀编号
        function generatePrefixedPhone(phone, festival) {
            const yearCode = String(new Date().getFullYear()).slice(-1); 
            let prefix = "";
            if (festival === "清明节") prefix = `${yearCode}m`;
            else if (festival === "中元节") prefix = `${yearCode}y`;
            else if (festival === "不空羂索") prefix = `${yearCode}q`;
            else if (festival === "感恩护法") prefix = `${yearCode}b`;
            else prefix = `${yearCode}x`;
            return prefix + phone;
        }

        // 7. 提交与 PDF
        function submitUserData() {
            const btn = document.getElementById("btnSubmit");
            const name = document.getElementById("mainName").value;
            const festival = document.getElementById("festival").value;
            const phone = document.getElementById("phoneNumber").value;

            if (!name || !festival) return alert("请填写姓名和法会类别");

            if (btn.disabled) return; 
            btn.disabled = true;
            btn.innerHTML = "⏳ 处理中...";

            const newCode = generatePrefixedPhone(phone, festival);

            // 模拟提交延迟
            setTimeout(() => {
                // 填充 PDF
                document.getElementById("pdfDate").innerText = new Date().toLocaleDateString();
                document.getElementById("pdfName").innerText = name;
                document.getElementById("pdfFestival").innerText = festival;
                document.getElementById("pdfCode").innerText = newCode;
                document.getElementById("pdfTotal").innerText = document.getElementById("totalAmountDisplay").innerText;
                document.getElementById("pdfDetails").innerHTML = document.getElementById("pdfContent").innerHTML;

                const element = document.getElementById("receiptArea");
                element.style.display = "block";

                const opt = {
                    margin: 1,
                    filename: `超度回执_${newCode}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    element.style.display = "none";
                    btn.innerHTML = "✅ 提交成功";
                    alert("提交成功！PDF 回执已下载。");
                });
            }, 1500);
        }

        // 初始化
        document.addEventListener("DOMContentLoaded", initGroups);
    </script>
</body>
</html>
