<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=80mm">
    <title>打印小票</title>
    <style>
        body {
            width: 80mm;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            margin-bottom: 10px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
        }
        .header p {
            margin: 2px 0;
            font-size: 14px;
        }
        .receipt-info p {
            margin: 2px 0;
            line-height: 1.3;
            font-size: 15px;
        }
        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .label {
            flex: 2;
            text-align: left;
            min-width: 120px;
        }
        .formula {
            flex: 1;
            text-align: center;
            min-width: 70px;
        }
        .amount {
            flex: 1;
            text-align: right;
            min-width: 60px;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            font-style: italic;
            color: #000;
            border-top: 1px dashed #000;
            padding-top: 10px;
            margin-top: 10px;
        }
        .payment-select {
            margin-bottom: 10px;
        }
        .payment-select label {
            display: inline-block;
            margin-right: 10px;
        }
        .payment-select select {
            width: 100px;
            padding: 2px;
        }
        .save-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            margin: 4px 2px;
            cursor: pointer;
        }
        .save-btn:hover {
            background-color: #45a049;
        }
        .debug-info {
            background-color: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            font-size: 12px;
        }
        @media print {
            .payment-select, .save-btn, .debug-info {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>PERSATUAN MIAO LI TANG SIBU</h2>
        <p>Tel: 013980446 (寺)</p>
        <p>JALAN PASAI SIONG OFF 25TH MILE</p>
        <p>JALAN OYA, SIBU SARAWAK</p>
        <h2>DONATION</h2>
    </div>

    <div class="payment-select">
        <label for="paymentSelect">收款方式:</label>
        <select id="paymentSelect">
            <option value="Cash">现金</option>
            <option value="Transfer">转账</option>
        </select>
        <button class="save-btn" onclick="saveReceipt()">保存数据</button>
    </div>

    <div class="debug-info">
        <strong>调试信息:</strong><br>
        <span id="debugText">等待接收数据...</span>
    </div>

    <div id="receiptInfo" class="receipt-info"></div>
    <div id="summarySection" class="total-section"></div>

    <div class="footer">
        <p> 愿一切吉祥如意，功德圆满 </p>
        <p>欢迎再次光临</p>
    </div>

    <script>
        // 全局变量存储数据
        let currentData = {};
        let isRendered = false;
        let SYSTEM_ID = 'festival_system'; // 固定系统ID用于测试

        function updateDebugInfo() {
            const debugText = document.getElementById('debugText');
            debugText.innerHTML = `
                系统ID: ${SYSTEM_ID}<br>
                当前付款方式: ${document.getElementById('paymentSelect').value}<br>
                收据号: ${currentData.receiptNo || '未生成'}<br>
                总金额: ${currentData.total || '未计算'}<br>
                数据状态: ${JSON.stringify(currentData, null, 2) || '未初始化'}
            `;
        }

        function setReceiptNumberIfEmpty() {
            const input = window.opener?.document.getElementById("receiptNumber");
            const currentReceiptNo = input?.value?.trim();
            
            // 如果已有编号，不再生成
            if (currentReceiptNo && currentReceiptNo !== "") {
                return currentReceiptNo;
            }

            // 生成新的编号并保存到 input
            const newNumber = generateReceiptNumber();
            if (input) input.value = newNumber;
            
            return newNumber;
        }

        function generateReceiptNumber() {
            const now = new Date();
            const year = String(now.getFullYear()).slice(-2);           // "25"
            const month = String(now.getMonth() + 1).padStart(2, '0');  // "05"
            const ymKey = `${year}${month}`;                            // "2505"

            // 使用系统特定的键名
            const counterKey = `receiptCounter_${SYSTEM_ID}`;
            const yearMonthKey = `receiptYearMonth_${SYSTEM_ID}`;

            const storedYM = localStorage.getItem(yearMonthKey);

            if (storedYM !== ymKey) {
                localStorage.setItem(counterKey, 1);
                localStorage.setItem(yearMonthKey, ymKey);
            }

            let counter = parseInt(localStorage.getItem(counterKey), 10);
            if (isNaN(counter) || counter < 1) {
                counter = 1;
            }

            const receiptNumber = `MLTS-${ymKey}-${String(counter).padStart(4, '0')}`;
            localStorage.setItem(counterKey, counter + 1);
            return receiptNumber;
        }

        // 计算总金额的函数
        function calculateTotal(data) {
            let total = parseFloat(data.donation || 0);
            const priceMap = { token: 5, boat: 30, lotus: 6, paper3: 3, paper6: 6, paper27: 27 };
            
            ["ancestor", "baby", "enemy", "past", "ground"].forEach(group => {
                (data[group] || []).forEach(item => {
                    Object.entries(item).forEach(([key, value]) => {
                        if (value && priceMap[key]) {
                            const quantity = parseFloat(value);
                            if (!isNaN(quantity)) {
                                total += quantity * priceMap[key];
                            }
                        }
                    });
                });
            });
            
            return total.toFixed(2);
        }

        // 缓存当日收据的功能
        function cacheReceiptData(data) {
            const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            
            // 使用固定的系统ID
            const cacheKey = `daily_receipts_${today}_festival_system`;
            
            // 获取现有的缓存数据
            let cachedReceipts = JSON.parse(localStorage.getItem(cacheKey) || []);
            
            // 添加当前收据数据，确保包含所有必要字段
            const receiptEntry = {
                timestamp: new Date().toISOString(),
                receiptData: {
                    ...data,
                    paymentMethod: data.paymentMethod || 'Cash',
                    total: data.total || calculateTotal(data)
                },
                systemId: 'festival_system'
            };
            
            cachedReceipts.push(receiptEntry);
            
            // 保存回localStorage
            localStorage.setItem(cacheKey, JSON.stringify(cachedReceipts));
            
            console.log(`收据已缓存: ${data.receiptNo || 'N/A'}`);
            console.log(`缓存键: ${cacheKey}`);
            console.log(`缓存数据:`, cachedReceipts);
            
            alert(`数据已保存！\n缓存键: ${cacheKey}\n收据号: ${data.receiptNo || 'N/A'}\n总金额: RM ${receiptEntry.receiptData.total}\n系统ID: festival_system`);
        }

        function renderReceipt(data) {
            const receiptNumber = data.receiptNo || setReceiptNumberIfEmpty();
            const currentYear = new Date().getFullYear();
            
            // 获取用户选择的付款方式
            const paymentMethod = document.getElementById('paymentSelect').value;
            
            let content = `
                <div>
                    <p><strong>D/NO:</strong> ${receiptNumber}</p>
                    <p><strong>时间:</strong> ${new Date().toLocaleString()}</p>
                    <p><strong>付款方式:</strong> ${paymentMethod}</p>
                    <p><strong>主祈者:</strong> ${data.name || "未填写"}</p>
                    <p><strong>电话:</strong> ${data.phone || "未填写"}</p>
                    <p><strong>报名 ${currentYear} 年</strong> ${data.festival || "未选择"} 超度法会</p>
                </div>
            `;

            let total = parseFloat(data.donation || 0);
            const priceMap = { token: 5, boat: 30, lotus: 6, paper3: 3, paper6: 6, paper27: 27 };
            const nameMap = { token: "超度令牌", boat: "法船配套", lotus: "莲花", paper3: "纸金 3", paper6: "纸金 6", paper27: "纸金 27" };
            const summary = {};

            ["ancestor", "baby", "enemy", "past", "ground"].forEach(group => {
                (data[group] || []).forEach(item => {
                    Object.entries(item).forEach(([key, value]) => {
                        if (value && priceMap[key]) {
                            const quantity = parseFloat(value);
                            if (!isNaN(quantity)) {
                                if (!summary[key]) summary[key] = 0;
                                summary[key] += quantity;
                                total += quantity * priceMap[key];
                            }
                        }
                    });
                });
            });

            let items = "";
            Object.entries(summary).forEach(([key, qty]) => {
                const subtotal = qty * priceMap[key];
                const unit = key === 'lotus' ? '朵' : key.startsWith('paper') ? '份' : key === 'boat' ? '套' : '个';
                items += `
                    <div class="item-row">
                        <span class="label">${nameMap[key]}</span>
                        <span class="formula">${priceMap[key]} × ${qty}</span>
                        <span class="amount">${subtotal.toFixed(2)}</span>
                    </div>
                `;
            });

            if (total > 0) {
                items += `
                    <div class="item-row">
                        <span class="label">超度报名供养金</span>
                        <span class="formula"></span>
                        <span class="amount">${parseFloat(data.donation || 0).toFixed(2)}</span>
                    </div>
                `;
            }

            content += items + `
                <div class="item-row" style="font-weight: bold; margin-top: 5px;">
                    <span class="label">总计</span>
                    <span class="formula"></span>
                    <span class="amount">RM ${total.toFixed(2)}</span>
                </div>
            `;

            document.getElementById("receiptInfo").innerHTML = content;
            isRendered = true;
        }

        function saveReceipt() {
            // 将当前选择的付款方式添加到数据中
            const paymentMethod = document.getElementById('paymentSelect').value;
            currentData.paymentMethod = paymentMethod;
            
            // 如果还没有收据号，生成一个
            if (!currentData.receiptNo) {
                currentData.receiptNo = setReceiptNumberIfEmpty();
            }
            
            // 计算总金额
            currentData.total = calculateTotal(currentData);
            
            // 缓存数据
            cacheReceiptData(currentData);
            
            // 重新渲染以显示最新的付款方式
            renderReceipt(currentData);
            
            // 更新调试信息
            updateDebugInfo();
        }

        function printReceipt() {
            // 确保数据已保存
            saveReceipt();
            setTimeout(() => window.print(), 500);
        }

        window.addEventListener("message", (event) => {
            try {
                const data = JSON.parse(event.data);
                currentData = {...data}; // 保存原始数据
                
                renderReceipt(data);
                
                // 添加打印按钮
                const printBtn = document.createElement('button');
                printBtn.textContent = '打印收据';
                printBtn.className = 'save-btn';
                printBtn.onclick = printReceipt;
                printBtn.style.marginTop = '10px';
                
                document.querySelector('.payment-select').appendChild(printBtn);
                
                // 更新调试信息
                updateDebugInfo();
            } catch (error) {
                console.error("小票数据处理错误:", error);
            }
        });
        
        // 监听付款方式变化
        document.getElementById('paymentSelect').addEventListener('change', function() {
            if (isRendered) {
                renderReceipt(currentData);
            }
            updateDebugInfo();
        });
    </script>
</body>
</html>
